<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Part Verify - GitHub Test</title>
<style>
  :root { --bg:#f0f2f5; --card:#fff; --primary:#4361ee; --success:#06d6a0; --danger:#ef476f; --warning:#ffd166; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); padding:16px; max-width:480px; margin:0 auto; }
  h2 { text-align:center; margin-bottom:16px; font-size:1.2rem; }
  .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
  label { font-size:0.75rem; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
  input[type="text"], input[type="password"] { width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:12px; font-size:1rem; font-weight:700; text-transform:uppercase; }
  .camera-box { position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:12px; overflow:hidden; margin:10px 0; }
  video, #previewImg { width:100%; height:100%; object-fit:cover; }
  #previewImg { display:none; background:#111; object-fit:contain; }
  .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px; transition:0.2s; }
  .btn:active { transform:scale(0.98); }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-gray { background:#6c757d; color:#fff; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-row { display:flex; gap:8px; }
  .btn-row .btn { flex:1; margin-top:0; }
  .result { margin-top:12px; padding:14px; border-radius:12px; text-align:center; font-weight:700; display:none; }
  .result.ok { background:rgba(6,214,160,0.15); color:#047857; border:2px solid var(--success); display:block; }
  .result.fail { background:rgba(239,71,111,0.15); color:#be123c; border:2px solid var(--danger); display:block; }
  .result.loading { background:rgba(67,97,238,0.1); color:var(--primary); border:2px solid var(--primary); display:block; }
  .ocr-info { font-size:0.8rem; color:#555; margin-top:10px; font-family:monospace; background:#f5f5f5; padding:10px; border-radius:8px; display:none; line-height:1.5; }
  .conf-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:700; margin-left:6px; }
  .conf-high { background:rgba(6,214,160,0.2); color:#047857; }
  .conf-low { background:rgba(239,71,111,0.2); color:#be123c; }
  .hint { font-size:0.75rem; color:#888; text-align:center; margin-top:6px; }
  .api-section { border-top:2px dashed #e0e0e0; padding-top:12px; margin-top:12px; }
  #fileInput { display:none; }
</style>
</head>
<body>

<h2>🤖 AI Part Verify</h2>

<div class="card">
  <label>Part Number</label>
  <input type="text" id="partInput" placeholder="e.g. 45535-09250" autocomplete="off">
  <div class="hint">Type or scan the part number first</div>
</div>

<div class="card">
  <label>Photo of Label</label>
  <div class="camera-box" id="camBox">
    <video id="video" autoplay playsinline></video>
    <img id="previewImg">
  </div>
  
  <input type="file" id="fileInput" accept="image/*" capture="environment">
  
  <div class="btn-row" id="controls">
    <button class="btn btn-gray" onclick="startCam()">📷 Camera</button>
    <button class="btn btn-gray" onclick="document.getElementById('fileInput').click()">🖼 Gallery</button>
  </div>
  <button class="btn btn-primary" id="snapBtn" style="display:none;" onclick="snap()">⚡ Capture</button>
  <button class="btn btn-gray" id="retakeBtn" style="display:none;" onclick="retake()">🔄 Retake</button>
  
  <div class="ocr-info" id="ocrInfo"></div>
</div>

<div class="card api-section">
  <label>API Key (OCR.space)</label>
  <input type="password" id="apiKey" placeholder="Paste your OCR.space API key" autocomplete="off">
  <div class="hint">Get free key at ocr.space/ocrapi/freekey</div>
</div>

<div class="card">
  <button class="btn btn-success" id="verifyBtn" onclick="verify()" disabled>✅ AI Verify</button>
  <div class="result" id="result"></div>
</div>

<script>
const video = document.getElementById('video');
const previewImg = document.getElementById('previewImg');
const snapBtn = document.getElementById('snapBtn');
const retakeBtn = document.getElementById('retakeBtn');
const controls = document.getElementById('controls');
const verifyBtn = document.getElementById('verifyBtn');
const ocrInfo = document.getElementById('ocrInfo');
const result = document.getElementById('result');

let stream = null;
let capturedImage = null;

function startCam() {
  navigator.mediaDevices.getUserMedia({ 
    video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} } 
  })
  .then(s => { 
    stream = s; 
    video.srcObject = s; 
    snapBtn.style.display = 'block'; 
    controls.style.display = 'none'; 
  })
  .catch(e => alert('Camera error: ' + e.message));
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function snap() {
  const c = document.createElement('canvas');
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  capturedImage = c.toDataURL('image/jpeg', 0.95);
  
  previewImg.src = capturedImage;
  previewImg.style.display = 'block';
  video.style.display = 'none';
  stopCam();
  snapBtn.style.display = 'none';
  retakeBtn.style.display = 'block';
  verifyBtn.disabled = false;
  result.style.display = 'none';
  ocrInfo.style.display = 'none';
}

function retake() {
  previewImg.style.display = 'none';
  video.style.display = 'block';
  capturedImage = null;
  retakeBtn.style.display = 'none';
  ocrInfo.style.display = 'none';
  verifyBtn.disabled = true;
  result.style.display = 'none';
  startCam();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    capturedImage = evt.target.result;
    previewImg.src = capturedImage;
    previewImg.style.display = 'block';
    video.style.display = 'none';
    controls.style.display = 'none';
    retakeBtn.style.display = 'block';
    verifyBtn.disabled = false;
    result.style.display = 'none';
  };
  reader.readAsDataURL(file);
});

async function verify() {
  if (!capturedImage) return alert('Take photo first');
  const inputVal = document.getElementById('partInput').value.trim().toUpperCase();
  if (!inputVal) return alert('Enter part number first');
  
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) return alert('Paste OCR.space API key first');
  
  verifyBtn.disabled = true;
  result.className = 'result loading';
  result.innerHTML = '🤖 AI reading photo...<br><small>Sending to OCR.space</small>';
  result.style.display = 'block';
  
  try {
    const formData = new FormData();
    formData.append('base64Image', capturedImage);
    formData.append('language', 'eng');
    formData.append('isOverlayRequired', 'false');
    formData.append('scale', 'true');
    formData.append('OCREngine', '2'); // Engine 2 = more accurate
    
    const res = await fetch('https://api.ocr.space/parse/image', {
      method: 'POST',
      headers: { 'apikey': apiKey },
      body: formData
    });
    
    const data = await res.json();
    
    if (data.IsErroredOnProcessing) {
      throw new Error(data.ErrorMessage || 'OCR failed');
    }
    
    const parsed = data.ParsedResults?.[0];
    if (!parsed) throw new Error('No text detected');
    
    const raw = parsed.ParsedText || '';
    const conf = parseFloat(parsed.TextOverlay?.Lines?.[0]?.Words?.[0]?.Confidence) || 
                 parsed.TextOverlay?.Lines?.[0]?.MaxHeight || 0);
    
    // Clean for part number matching
    const clean = raw.toUpperCase()
      .replace(/[^A-Z0-9\-]/g, '')
      .replace(/O/g, '0')
      .replace(/I/g, '1')
      .replace(/L/g, '1')
      .replace(/S/g, '5')
      .replace(/B/g, '8')
      .trim();
    
    const confClass = conf > 80 ? 'conf-high' : 'conf-low';
    const confText = conf > 80 ? 'HIGH' : 'LOW';
    
    ocrInfo.innerHTML = `
      <strong>AI Raw:</strong> ${escapeHtml(raw)}<br>
      <strong>Cleaned:</strong> ${escapeHtml(clean)}<br>
      <strong>Input:</strong> ${escapeHtml(inputVal)}<br>
      <strong>Confidence:</strong> <span class="conf-badge ${confClass}">${confText} ${conf}%</span>
    `;
    ocrInfo.style.display = 'block';
    
    // Match logic
    const match = (clean === inputVal) || 
                  clean.includes(inputVal) || 
                  inputVal.includes(clean) ||
                  similarity(clean, inputVal) > 0.85;
    
    if (match) {
      result.className = 'result ok';
      result.innerHTML = `✅ MATCH<br><small>${escapeHtml(inputVal)}</small>`;
      beep('ok');
    } else {
      result.className = 'result fail';
      result.innerHTML = `❌ MISMATCH<br><small>Expected: ${escapeHtml(inputVal)}<br>Found: ${escapeHtml(clean)}</small>`;
      beep('fail');
    }
    
  } catch (err) {
    result.className = 'result fail';
    result.innerHTML = '❌ Error<br><small>' + escapeHtml(err.message) + '</small>';
  }
  verifyBtn.disabled = false;
}

function similarity(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  const costs = [];
  for (let i = 0; i <= shorter.length; i++) costs[i] = i;
  for (let i = 1; i <= longer.length; i++) {
    let nw = costs[0];
    costs[0] = i;
    for (let j = 1; j <= shorter.length; j++) {
      const cj = Math.min(1 + Math.min(costs[j], costs[j-1]), longer[i-1] === shorter[j-1] ? nw : nw + 1);
      nw = costs[j];
      costs[j] = cj;
    }
  }
  return (longer.length - costs[shorter.length]) / longer.length;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function beep(type) {
  try {
    const ctx = new (window.AudioContext||webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = type==='ok' ? 880 : 200;
    g.gain.value = 0.1;
    o.start(); o.stop(ctx.currentTime + (type==='ok'?0.15:0.3));
  } catch(e){}
}

window.addEventListener('beforeunload', () => stopCam());
</script>

</body>
</html>
