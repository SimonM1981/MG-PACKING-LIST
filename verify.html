<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Part Number Photo Verify</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a2e;
    --primary: #4361ee;
    --success: #06d6a0;
    --danger: #ef476f;
    --warning: #ffd166;
    --border: #e0e0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  h2 { text-align: center; margin-bottom: 20px; font-size: 1.3rem; }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #666;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-bottom: 4px;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
  }
  .camera-section {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin: 12px 0;
    display: none;
  }
  .camera-section.active { display: block; }
  video, canvas, #previewImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #previewImg { display: none; object-fit: contain; background: #111; }
  #previewImg.active { display: block; }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-secondary { background: #6c757d; color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .result-box {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
    display: none;
    animation: popIn 0.3s ease;
  }
  .result-box.match { background: rgba(6,214,160,0.15); color: #047857; border: 2px solid var(--success); display: block; }
  .result-box.mismatch { background: rgba(239,71,111,0.15); color: #be123c; border: 2px solid var(--danger); display: block; }
  .result-box.loading { background: rgba(67,97,238,0.1); color: var(--primary); border: 2px solid var(--primary); display: block; }
  
  .ocr-text {
    margin-top: 12px;
    padding: 12px;
    background: #f8f9fa;
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.9rem;
    color: #555;
    word-break: break-all;
    display: none;
  }
  .ocr-text.active { display: block; }
  
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    font-size: 0.8rem;
    color: #888;
  }
  
  @keyframes popIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; margin-top: 0; }
  
  #fileInput { display: none; }
  
  .guide {
    font-size: 0.8rem;
    color: #888;
    text-align: center;
    margin-top: 8px;
    line-height: 1.4;
  }
</style>
<base target="_blank">
</head>
<body>

<h2>📷 Part Number Verify</h2>

<div class="card">
  <label>Enter Part Number</label>
  <input type="text" id="partInput" placeholder="e.g. 45535-09250" autocomplete="off">
  <div class="guide">Type or scan the part number first</div>
</div>

<div class="card">
  <label>Photo of Label</label>
  
  <div class="camera-section" id="cameraSection">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="previewImg" alt="Captured">
  </div>
  
  <input type="file" id="fileInput" accept="image/*" capture="environment">
  
  <div class="btn-row" id="cameraControls">
    <button class="btn btn-secondary" onclick="startCamera()">📷 Camera</button>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">🖼 Gallery</button>
  </div>
  
  <button class="btn btn-primary" id="snapBtn" style="display:none;" onclick="takePhoto()">⚡ Capture</button>
  <button class="btn btn-secondary" id="retakeBtn" style="display:none;" onclick="retake()">🔄 Retake</button>
  
  <div class="ocr-text" id="ocrText"></div>
</div>

<div class="card">
  <button class="btn btn-success" id="verifyBtn" onclick="verifyPart()" disabled>
    ✅ Verify Match
  </button>
  <div class="result-box" id="resultBox"></div>
</div>

<div class="status-bar">
  <span id="engineStatus">OCR Engine: Ready</span>
  <span id="matchScore"></span>
</div>

<script>
// ========== CONFIG ==========
const SIMILARITY_THRESHOLD = 0.85; // 85% match allowed (handles OCR misreads like O/0, I/1)

// ========== ELEMENTS ==========
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const previewImg = document.getElementById('previewImg');
const cameraSection = document.getElementById('cameraSection');
const snapBtn = document.getElementById('snapBtn');
const retakeBtn = document.getElementById('retakeBtn');
const cameraControls = document.getElementById('cameraControls');
const partInput = document.getElementById('partInput');
const verifyBtn = document.getElementById('verifyBtn');
const resultBox = document.getElementById('resultBox');
const ocrText = document.getElementById('ocrText');
const engineStatus = document.getElementById('engineStatus');
const fileInput = document.getElementById('fileInput');

let stream = null;
let capturedImage = null;
let tesseractWorker = null;

// ========== INIT TESSERACT ==========
(async function initTesseract() {
  engineStatus.textContent = 'OCR Engine: Loading...';
  try {
    tesseractWorker = await Tesseract.createWorker('eng');
    engineStatus.textContent = 'OCR Engine: Ready';
  } catch (e) {
    engineStatus.textContent = 'OCR Engine: Failed';
    console.error(e);
  }
})();

// ========== CAMERA ==========
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
    });
    video.srcObject = stream;
    cameraSection.classList.add('active');
    snapBtn.style.display = 'block';
    cameraControls.style.display = 'none';
  } catch (err) {
    alert('Camera error: ' + err.message);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  cameraSection.classList.remove('active');
  snapBtn.style.display = 'none';
}

function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedImage = canvas.toDataURL('image/jpeg', 0.9);
  previewImg.src = capturedImage;
  previewImg.classList.add('active');
  video.style.display = 'none';
  stopCamera();
  snapBtn.style.display = 'none';
  retakeBtn.style.display = 'block';
  verifyBtn.disabled = false;
  ocrText.classList.remove('active');
  resultBox.style.display = 'none';
}

function retake() {
  previewImg.classList.remove('active');
  previewImg.src = '';
  video.style.display = 'block';
  capturedImage = null;
  retakeBtn.style.display = 'none';
  ocrText.classList.remove('active');
  resultBox.style.display = 'none';
  verifyBtn.disabled = true;
  startCamera();
}

// ========== FILE UPLOAD ==========
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    capturedImage = evt.target.result;
    previewImg.src = capturedImage;
    previewImg.classList.add('active');
    cameraSection.classList.add('active');
    video.style.display = 'none';
    cameraControls.style.display = 'none';
    retakeBtn.style.display = 'block';
    verifyBtn.disabled = false;
    ocrText.classList.remove('active');
    resultBox.style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// ========== VERIFY ==========
async function verifyPart() {
  if (!capturedImage) { alert('Please take a photo first'); return; }
  if (!partInput.value.trim()) { alert('Please enter part number first'); return; }
  
  resultBox.className = 'result-box loading';
  resultBox.textContent = '🔍 Reading photo...';
  resultBox.style.display = 'block';
  verifyBtn.disabled = true;
  
  try {
    const { data: { text } } = await tesseractWorker.recognize(capturedImage);
    const rawOCR = text.trim();
    const cleanOCR = cleanText(rawOCR);
    const inputVal = cleanText(partInput.value);
    
    ocrText.innerHTML = `<strong>OCR Raw:</strong><br>${escapeHtml(rawOCR)}<br><br>
                         <strong>Cleaned:</strong> ${escapeHtml(cleanOCR)}<br>
                         <strong>Input:</strong> ${escapeHtml(inputVal)}`;
    ocrText.classList.add('active');
    
    const similarity = calculateSimilarity(inputVal, cleanOCR);
    document.getElementById('matchScore').textContent = `Match: ${(similarity*100).toFixed(1)}%`;
    
    if (similarity >= SIMILARITY_THRESHOLD || cleanOCR.includes(inputVal) || inputVal.includes(cleanOCR)) {
      resultBox.className = 'result-box match';
      resultBox.innerHTML = `✅ MATCH<br><small>${escapeHtml(inputVal)}</small>`;
      playBeep('success');
    } else {
      resultBox.className = 'result-box mismatch';
      resultBox.innerHTML = `❌ MISMATCH<br><small>Expected: ${escapeHtml(inputVal)}<br>Found: ${escapeHtml(cleanOCR)}</small>`;
      playBeep('fail');
    }
  } catch (err) {
    resultBox.className = 'result-box mismatch';
    resultBox.textContent = 'OCR Error: ' + err.message;
  } finally {
    verifyBtn.disabled = false;
  }
}

// ========== UTILS ==========
function cleanText(str) {
  return str.toUpperCase()
    .replace(/[^A-Z0-9\-]/g, '')   // keep only letters, numbers, dash
    .replace(/O/g, '0')             // common OCR misread
    .replace(/I/g, '1')             // common OCR misread
    .replace(/L/g, '1')             // common OCR misread
    .replace(/S/g, '5')             // common OCR misread
    .replace(/B/g, '8')             // common OCR misread
    .trim();
}

function calculateSimilarity(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  const costs = [];
  for (let i = 0; i <= shorter.length; i++) costs[i] = i;
  for (let i = 1; i <= longer.length; i++) {
    let nw = costs[0];
    costs[0] = i;
    for (let j = 1; j <= shorter.length; j++) {
      const cj = Math.min(1 + Math.min(costs[j], costs[j-1]), (longer[i-1] === shorter[j-1] ? nw : nw + 1));
      nw = costs[j];
      costs[j] = cj;
    }
  }
  return (longer.length - costs[shorter.length]) / longer.length;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'success') {
      osc.frequency.value = 880;
      gain.gain.value = 0.1;
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    } else {
      osc.frequency.value = 200;
      gain.gain.value = 0.1;
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    }
  } catch(e) {}
}

// Cleanup on page hide
window.addEventListener('beforeunload', () => {
  stopCamera();
  if (tesseractWorker) tesseractWorker.terminate();
});
</script>

</body>
</html>
