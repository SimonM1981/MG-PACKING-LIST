<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Part Verify - Accurate</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root { --bg:#f0f2f5; --card:#fff; --primary:#4361ee; --success:#06d6a0; --danger:#ef476f; --warning:#ffd166; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); padding:16px; max-width:480px; margin:0 auto; }
  h2 { text-align:center; margin-bottom:16px; font-size:1.2rem; }
  .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
  label { font-size:0.75rem; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
  input[type="text"] { width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:12px; font-size:1.1rem; font-weight:700; text-transform:uppercase; }
  .camera-box { position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:12px; overflow:hidden; margin:10px 0; }
  video, #previewImg { width:100%; height:100%; object-fit:cover; }
  #previewImg { display:none; background:#111; object-fit:contain; }
  .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-gray { background:#6c757d; color:#fff; }
  .btn:disabled { opacity:0.5; }
  .btn-row { display:flex; gap:8px; }
  .btn-row .btn { flex:1; margin-top:0; }
  .result { margin-top:12px; padding:14px; border-radius:12px; text-align:center; font-weight:700; display:none; }
  .result.ok { background:rgba(6,214,160,0.15); color:#047857; border:2px solid var(--success); display:block; }
  .result.fail { background:rgba(239,71,111,0.15); color:#be123c; border:2px solid var(--danger); display:block; }
  .result.warn { background:rgba(255,209,102,0.2); color:#b45309; border:2px solid var(--warning); display:block; }
  .ocr-info { font-size:0.8rem; color:#666; margin-top:8px; font-family:monospace; background:#f5f5f5; padding:8px; border-radius:6px; display:none; }
  .confidence { font-size:0.75rem; color:#888; margin-top:4px; }
  #fileInput { display:none; }
</style>
</head>
<body>

<h2>📷 Part Verify (Accurate)</h2>

<div class="card">
  <label>Part Number</label>
  <input type="text" id="partInput" placeholder="e.g. 45535-09250">
</div>

<div class="card">
  <label>Photo of Label</label>
  <div class="camera-box" id="camBox">
    <video id="video" autoplay playsinline></video>
    <img id="previewImg">
  </div>
  
  <input type="file" id="fileInput" accept="image/*" capture="environment">
  
  <div class="btn-row" id="controls">
    <button class="btn btn-gray" onclick="startCam()">📷 Camera</button>
    <button class="btn btn-gray" onclick="document.getElementById('fileInput').click()">🖼 Gallery</button>
  </div>
  <button class="btn btn-primary" id="snapBtn" style="display:none;" onclick="snap()">⚡ Capture</button>
  <button class="btn btn-gray" id="retakeBtn" style="display:none;" onclick="retake()">🔄 Retake</button>
  
  <div class="ocr-info" id="ocrInfo"></div>
  <div class="confidence" id="confDisplay"></div>
</div>

<div class="card">
  <button class="btn btn-success" id="verifyBtn" onclick="verify()" disabled>✅ Verify</button>
  <div class="result" id="result"></div>
</div>

<script>
const video = document.getElementById('video');
const previewImg = document.getElementById('previewImg');
const snapBtn = document.getElementById('snapBtn');
const retakeBtn = document.getElementById('retakeBtn');
const controls = document.getElementById('controls');
const verifyBtn = document.getElementById('verifyBtn');
const ocrInfo = document.getElementById('ocrInfo');
const confDisplay = document.getElementById('confDisplay');
const result = document.getElementById('result');

let stream = null;
let capturedImage = null;
let worker = null;
let lastConfidence = 0;

(async function init() {
  worker = await Tesseract.createWorker('eng');
})();

function startCam() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} } })
    .then(s => { stream = s; video.srcObject = s; snapBtn.style.display='block'; controls.style.display='none'; })
    .catch(e => alert('Camera: ' + e.message));
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function snap() {
  const c = document.createElement('canvas');
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  c.getContext('2d').drawImage(video, 0, 0);
  
  // Preprocess
  const processed = preprocess(c);
  capturedImage = processed.toDataURL('image/jpeg', 0.9);
  
  previewImg.src = capturedImage;
  previewImg.style.display = 'block';
  video.style.display = 'none';
  stopCam();
  snapBtn.style.display = 'none';
  retakeBtn.style.display = 'block';
  verifyBtn.disabled = false;
  result.style.display = 'none';
}

function retake() {
  previewImg.style.display = 'none';
  video.style.display = 'block';
  capturedImage = null;
  retakeBtn.style.display = 'none';
  ocrInfo.style.display = 'none';
  confDisplay.textContent = '';
  verifyBtn.disabled = true;
  result.style.display = 'none';
  startCam();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width;
      c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      const processed = preprocess(c);
      capturedImage = processed.toDataURL('image/jpeg', 0.9);
      previewImg.src = capturedImage;
      previewImg.style.display = 'block';
      video.style.display = 'none';
      controls.style.display = 'none';
      retakeBtn.style.display = 'block';
      verifyBtn.disabled = false;
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

// ===== PREPROCESSING - CRITICAL FOR ACCURACY =====
function preprocess(source) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = source.width;
  canvas.height = source.height;
  ctx.drawImage(source, 0, 0);
  
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;
  
  // Grayscale + aggressive contrast
  for (let i = 0; i < d.length; i += 4) {
    const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    // Threshold at 140: dark becomes black, light becomes white
    const val = gray > 140 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = val;
  }
  
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

// ===== VERIFY =====
async function verify() {
  if (!capturedImage) return alert('Take photo first');
  if (!document.getElementById('partInput').value.trim()) return alert('Enter part number first');
  
  verifyBtn.disabled = true;
  result.className = 'result warn';
  result.textContent = '🔍 Reading...';
  result.style.display = 'block';
  
  try {
    const { data } = await worker.recognize(capturedImage, undefined, {
      tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-',
      tessedit_pageseg_mode: '7' // Single uniform block of text
    });
    
    const raw = data.text.trim();
    const clean = cleanText(raw);
    const input = cleanText(document.getElementById('partInput').value);
    lastConfidence = data.confidence;
    
    ocrInfo.innerHTML = `<strong>OCR:</strong> ${escapeHtml(raw)}<br><strong>Clean:</strong> ${escapeHtml(clean)}<br><strong>Input:</strong> ${escapeHtml(input)}`;
    ocrInfo.style.display = 'block';
    confDisplay.textContent = `Confidence: ${data.confidence.toFixed(1)}%`;
    
    // If confidence is low, warn but still check
    if (data.confidence < 75) {
      result.className = 'result warn';
      result.innerHTML = `⚠️ LOW CONFIDENCE (${data.confidence.toFixed(0)}%)<br>Check manually`;
      verifyBtn.disabled = false;
      return;
    }
    
    const match = (clean === input) || clean.includes(input) || input.includes(clean);
    
    if (match) {
      result.className = 'result ok';
      result.innerHTML = `✅ MATCH<br><small>${escapeHtml(input)}</small>`;
      beep('ok');
    } else {
      result.className = 'result fail';
      result.innerHTML = `❌ MISMATCH<br><small>Expected: ${escapeHtml(input)}<br>Found: ${escapeHtml(clean)}</small>`;
      beep('fail');
    }
  } catch (err) {
    result.className = 'result fail';
    result.textContent = 'Error: ' + err.message;
  }
  verifyBtn.disabled = false;
}

function cleanText(s) {
  return s.toUpperCase()
    .replace(/[^0-9A-Z\-]/g, '')
    .replace(/O/g, '0')
    .replace(/I/g, '1')
    .replace(/L/g, '1')
    .replace(/S/g, '5')
    .replace(/B/g, '8')
    .trim();
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function beep(type) {
  try {
    const ctx = new (window.AudioContext||webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = type==='ok' ? 880 : 200;
    g.gain.value = 0.1;
    o.start(); o.stop(ctx.currentTime + (type==='ok'?0.15:0.3));
  } catch(e){}
}

window.addEventListener('beforeunload', () => { stopCam(); if(worker) worker.terminate(); });
</script>
</body>
</html>
