<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Missing Cartons — MG Packing</title>
<link rel="stylesheet" href="shared.css"><script src="shared.js"></script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div><div class="brand-name">MG Packing</div><div class="brand-sub">System v3.2</div></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">
      <svg class="moon"><use href="#ic-moon"/></svg>
      <svg class="sun"><use href="#ic-sun"/></svg>
    </button>
    <div class="section-label">Staff</div>
    <nav>
      <a href="#" data-page="index" onclick="goTo('index');return false"><svg><use href="#ic-list"/></svg>Packing Lists</a>
      <a href="#" data-page="staff" onclick="goTo('staff');return false"><svg><use href="#ic-plus"/></svg>Staff Entry</a>
    </nav>
    <div class="section-label">Supervisor</div>
    <nav>
      <a href="#" data-page="checker" onclick="goTo('checker');return false"><svg><use href="#ic-check-sq"/></svg>Checker View</a>
      <a href="#" data-page="transfer" onclick="goTo('transfer');return false"><svg><use href="#ic-transfer"/></svg>Transfer</a>
      <a href="#" data-page="rejects" class="danger" onclick="goTo('rejects');return false"><svg><use href="#ic-alert"/></svg>Reject List</a>
    </nav>
    <div class="section-label">Tools</div>
    <nav>
      <a href="#" data-page="missing" class="active"><svg><use href="#ic-missing"/></svg>Missing Cartons</a>
    </nav>
    <div style="flex:1"></div>
  </div>
  <div id="main">
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-missing"/></svg>Missing Cartons</div>
        <div class="page-subtitle">Check for gaps in carton sequences across all packing lists.</div>
      </div>
    </div>
    <div id="missing-content"><div class="empty-state"><div class="spinner" style="width:28px;height:28px;margin:0 auto 12px;display:block"></div><p>Loading cartons from all lists...</p></div></div>
  </div>
</div>

<script>
(function() {
  initSidebar('missing');

  function detectMissing(cartons) {
    if (!cartons || cartons.length < 2) return [];
    const byPart = {};
    cartons.forEach(c => {
      const partNo = ((c.parts && c.parts[0] && c.parts[0].partNo) || c.partNo || 'UNKNOWN').toUpperCase();
      if (!byPart[partNo]) byPart[partNo] = [];
      byPart[partNo].push(c);
    });
    const missing = [];
    for (const partNo in byPart) {
      const group = byPart[partNo];
      if (group.length < 2) continue;
      const parsed = group.map(c => {
        const id = (c.cartonId || '').trim().toUpperCase();
        const m = id.match(/^([A-Z]*-?)(\d+)(.*)$/);
        if (!m) return null;
        return { id, prefix: m[1] || '', num: parseInt(m[2], 10), suffix: m[3] || '', numLen: m[2].length };
      }).filter(Boolean);
      if (parsed.length < 2) continue;
      const prefixGroups = {};
      const padLengths = {};
      parsed.forEach(p => {
        const key = p.prefix + '|' + p.suffix;
        if (!prefixGroups[key]) { prefixGroups[key] = []; padLengths[key] = 0; }
        prefixGroups[key].push(p.num);
        padLengths[key] = Math.max(padLengths[key], p.numLen);
      });
      for (const key in prefixGroups) {
        const nums = prefixGroups[key].sort((a, b) => a - b);
        const [prefix, suffix] = key.split('|');
        const padLen = padLengths[key];
        for (let i = 0; i < nums.length - 1; i++) {
          if (nums[i + 1] - nums[i] > 20) continue;
          for (let n = nums[i] + 1; n < nums[i + 1]; n++) { missing.push(prefix + String(n).padStart(padLen, '0') + suffix); if (missing.length >= 20) return missing; }
        }
      }
    }
    return missing;
  }

  async function load() {
    const el = document.getElementById('missing-content');
    const allCartons = [];
    let lists = [];
    try { const res = await gasGet({ action: 'packingLists' }); if (res && res.lists) lists = res.lists; } catch(e) {}
    for (const list of lists) {
      try { const res = await gasGet({ action: 'cartons', listRef: list.listRef }); if (res && res.cartons) { res.cartons.forEach(c => { c._listRef = list.listRef; c._customer = list.customer; }); allCartons.push(...res.cartons); } } catch(e) {}
    }
    if (allCartons.length < 2) { el.innerHTML = '<div class="empty-state"><svg><use href="#ic-missing"/></svg><p>Not enough cartons to detect gaps.</p></div>'; return; }

    const byList = {};
    allCartons.forEach(c => { const key = (c._listRef || 'unknown') + '|' + (c._customer || 'Unknown'); if (!byList[key]) byList[key] = { listRef: c._listRef, customer: c._customer, cartons: [] }; byList[key].cartons.push(c); });
    let totalMissing = 0, hasAny = false;
    let html = '<div style="display:flex;flex-direction:column;gap:16px">';
    for (const key in byList) {
      const group = byList[key];
      const missing = detectMissing(group.cartons);
      if (missing.length === 0) continue;
      hasAny = true; totalMissing += missing.length;
      const byPrefix = {};
      missing.forEach(m => { const match = m.match(/^([A-Z]*)(\d+)$/); const prefix = match ? match[1] : ''; if (!byPrefix[prefix]) byPrefix[prefix] = []; byPrefix[prefix].push(m); });
      html += `<div class="card" style="padding:0;overflow:hidden"><div class="card-header"><div><div class="font-bold">${escHtml(group.customer || 'Unknown')}</div><div class="text-xs text-muted">${escHtml(group.listRef || '')} \u2014 ${group.cartons.length} cartons \u2014 <span style="color:var(--amber)">${missing.length} missing</span></div></div><span class="badge badge-amber">${missing.length} GAPS</span></div><div class="card-body">`;
      for (const prefix in byPrefix) {
        const prefixMissing = byPrefix[prefix];
        html += `<div style="margin-bottom:12px"><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-fg);font-weight:700;margin-bottom:8px">${prefix || 'Numbers'}: ${prefixMissing.length} missing</div><div style="display:flex;flex-wrap:wrap;gap:6px">`;
        prefixMissing.forEach(m => { html += `<span class="badge badge-amber" style="font-size:12px;padding:4px 10px">${escHtml(m)}</span>`; });
        html += '</div></div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
    if (!hasAny) { el.innerHTML = '<div class="empty-state"><svg><use href="#ic-check-circle"/></svg><p>No missing cartons found \u2014 all sequences are complete!</p></div>'; }
    else { el.innerHTML = `<div class="alert" style="margin-bottom:16px;background:var(--amber-dim);border:1.5px solid var(--amber-border);color:var(--amber)"><svg style="width:20px;height:20px;flex-shrink:0;color:var(--amber)"><use href="#ic-alert"/></svg><div><strong>${totalMissing} missing carton(s)</strong> detected.</div></div>` + html; }
  }

  load();
})();
</script>
</body>
</html>
