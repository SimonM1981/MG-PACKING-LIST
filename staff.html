*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}

@media(max-width:600px){
  .table-responsive{display:block}

}

.section-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-fg);border-bottom:1px solid var(--border);padding-bottom:8px;margin:20px 0 14px;font-weight:700}

.match-badge.fail{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border)}
.match-badge.no-bc{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.match-badge.checking{background:var(--muted);color:var(--muted-fg);border-color:var(--border)}
.part-card{background:var(--muted);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:18px;margin-bottom:14px;position:relative;transition:border-color .2s ease,background-color .25s ease}
.part-card:hover{border-color:var(--primary-border)}
.part-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.part-number{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);font-family:var(--font-mono)}
.part-remove{color:var(--danger);background:none;border:none;font-size:11px;font-weight:700;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .15s}
.part-remove:hover{background:var(--danger-dim)}
.detail-kv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:500px){.detail-kv{grid-template-columns:1fr 1fr}}
.kv-box{background:var(--muted);border-radius:var(--radius-sm);padding:10px 12px}
.kv-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:3px;font-weight:700}
.kv-value{font-size:13px;font-weight:700;color:var(--text)}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-in;overflow:hidden}
#lightbox img{max-width:94vw;max-height:94vh;object-fit:contain;border-radius:8px;transition:transform .25s ease;cursor:zoom-in}
#lightbox.zoomed img{transform:scale(2.5);max-width:none;max-height:none;cursor:zoom-out}
#lightbox.zoomed{cursor:zoom-out;overflow:auto;align-items:flex-start;justify-content:flex-start;padding:20vh 20vw}
#lightbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);z-index:201}
#toast-container{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--toast-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;color:var(--text);max-width:320px;pointer-events:auto;opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s,background-color .25s ease,border-color .25s ease,color .2s ease;font-weight:600;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:none}
.toast.success{border-color:var(--green-border);color:var(--green)}
.toast.error{border-color:var(--danger-border);color:var(--danger)}
.record-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;cursor:pointer;transition:all .2s ease;box-shadow:var(--shadow-sm)}
.record-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.record-card.rejected{border-left:4px solid var(--danger)}
.record-card.approved{border-left:4px solid var(--primary)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--muted-fg);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes pulse-anim{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse-anim 1.4s ease-in-out infinite}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .2s ease}
.online-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--primary);background:var(--primary-dim);padding:5px 12px;border-radius:20px;border:1px solid var(--primary-border);font-weight:700}
.ping-dot{position:relative;width:8px;height:8px;flex-shrink:0}
.ping-dot::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--primary);animation:ping 1.2s ease-in-out infinite;opacity:.6}
.ping-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--primary)}
@keyframes ping{0%{transform:scale(1);opacity:.6}75%{transform:scale(2);opacity:0}100%{transform:scale(2);opacity:0}}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted-fg)}
.empty-state svg{width:40px;height:40px;margin:0 auto 10px;opacity:.3}
.gap-8{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.gap-8.right{justify-content:flex-end}
.spacer{flex:1}
.text-primary{color:var(--primary)}.text-danger{color:var(--danger)}.text-amber{color:var(--amber)}.text-blue{color:var(--blue)}.text-green{color:var(--green)}.text-muted{color:var(--muted-fg)}
.text-sm{font-size:12px}.text-xs{font-size:11px}.font-bold{font-weight:700}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.hidden{display:none!important}
.complete-banner{background:var(--green-dim);border:1.5px solid var(--green-border);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:16px}
.complete-banner .complete-title{color:var(--green);font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.parts-summary{background:var(--muted);border-radius:var(--radius-sm);overflow:hidden;margin-top:10px}
.parts-summary table{width:100%}
.parts-summary th{background:var(--muted);font-size:9px;padding:8px 10px}
.parts-summary td{padding:8px 10px;font-size:12px;border-top:1px solid var(--border);color:var(--text)}
.password-gate{display:flex;align-items:center;justify-content:center;min-height:60vh}
.password-gate-inner{max-width:360px;width:100%;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:36px 28px;box-shadow:var(--shadow)}
.password-gate-icon{width:56px;height:56px;color:var(--primary);margin-bottom:20px;opacity:.7}
.password-gate-title{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;color:var(--text)}
.password-gate-sub{font-size:13px;color:var(--muted-fg);margin-bottom:24px;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted-fg)}

'use strict';

var GAS_URL = 'https://script.google.com/macros/s/AKfycbxtHkqSH3iUCe-8ZUT3PO500Rpm3OLTTEIrvLGP36sO9ZoDRVOLD29e2P25NlsTRdfy1Q/exec';

let currentListId = null;

let isSubmitting = false;

(function initTheme() {
  const saved = localStorage.getItem('mg-theme');
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mg-theme', next);
}

const apiCache = new Map();
const CACHE_TTL = 60000;
function cacheKey(params) { return JSON.stringify(params); }
function getCached(key) { const e = apiCache.get(key); if(!e) return null; if(Date.now()-e.ts>CACHE_TTL){apiCache.delete(key);return null;}return e.data; }
function setCached(key, data) { apiCache.set(key, { data, ts: Date.now() }); }
function invalidateCache() { apiCache.clear(); }

async function gasGet(params, opts) {
  if (!GAS_URL) return null;
  const key = cacheKey(params);
  if (!opts || !opts.noCache) { const c = getCached(key); if (c) return c; }
  const url = GAS_URL + '?' + new URLSearchParams(params);
  for (let a = 1; a <= 2; a++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(url, { signal: ctrl.signal, redirect: 'follow' });
      clearTimeout(t);
      const txt = await r.text();
      if (!txt || !txt.trim()) return null;
      if (txt.trim().startsWith('<')) { console.error('[gasGet] Got HTML for', params.action); return null; }
      try { const d = JSON.parse(txt); setCached(key, d); return d; } catch { return null; }
    } catch(err) { if (a < 2) await new Promise(r => setTimeout(r, 1500)); }
  }
  return null;
}

async function gasPost(data) {
  if (!GAS_URL) return null;
  for (let a = 1; a <= 2; a++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data), signal: ctrl.signal, redirect: 'follow' });
      clearTimeout(t);
      invalidateCache();
      const txt = await r.text();
      if (!txt || !txt.trim()) return null;
      if (txt.trim().startsWith('<')) { console.error('[gasPost] Got HTML for', data.action); return null; }
      try { return JSON.parse(txt); } catch { return null; }
    } catch(err) { if (a < 2) await new Promise(r => setTimeout(r, 1500)); }
  }
  return null;
}

function fmtTime(ts) { if (!ts) return '\u2014'; const d = new Date(ts); if (isNaN(d)) return String(ts).slice(11,16); return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

function compressImage(file, maxPx, q) {
  maxPx = maxPx || 1024;
  q = (q !== undefined) ? q : 0.7;
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > h && w > maxPx) { h = Math.round(h * maxPx / w); w = maxPx; }
      else if (h > maxPx) { w = Math.round(w * maxPx / h); h = maxPx; }
      
      const tryCompress = (quality, scale) => {
        const cw = Math.round(w * scale);
        const ch = Math.round(h * scale);
        const c = document.createElement('canvas');
        c.width = cw; c.height = ch;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, cw, ch);
        ctx.drawImage(img, 0, 0, cw, ch);
        const dataUrl = c.toDataURL('image/jpeg', quality);
        const sizeBytes = Math.round(dataUrl.length * 0.75);
        const targetBytes = 58000;
        
        if (sizeBytes <= targetBytes || (quality <= 0.25 && scale <= 0.4)) {
          res(dataUrl);
        } else if (quality > 0.25) {
          setTimeout(() => tryCompress(Math.max(0.25, quality - 0.1), scale), 0);
        } else {
          setTimeout(() => tryCompress(0.6, Math.max(0.4, scale - 0.15)), 0);
        }
      };
      
      tryCompress(q, 1.0);
    };
    img.onerror = rej;
    img.src = url;
  });
}

async function openCamera(label, cb) {
  cameraCallback = cb;
  document.getElementById('camera-label').textContent = 'Scan \u2014 ' + label;
  document.getElementById('camera-error').classList.add('hidden');
  document.getElementById('camera-modal').classList.remove('hidden');
  try {
    if (typeof Html5Qrcode === 'undefined') throw new Error('Scanner library not loaded.');
    if (cameraReader) { try { await cameraReader.stop(); } catch{} try { await cameraReader.clear(); } catch{} cameraReader = null; }
    await new Promise(r => setTimeout(r, 200));
    cameraReader = new Html5Qrcode('camera-video');
    const devices = await Html5Qrcode.getCameras();
    if (!devices || devices.length === 0) throw new Error('No camera found');
    const back = devices.find(d => /back|rear|environment/i.test(d.label));
    const cameraId = back ? { deviceId: back.id } : { facingMode: 'environment' };
    await cameraReader.start(cameraId,
      { fps: 10, qrbox: { width: 310, height: 240 }, aspectRatio: 1.7778, disableFlip: false,
        videoConstraints: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      },
      (decodedText) => { closeCamera(); cb(decodedText.trim().toUpperCase()); },
      () => {}
    );
  } catch(e) {
    document.getElementById('camera-error').textContent = e.message.includes('Permission') ? 'Camera permission denied.' : 'Camera unavailable: ' + e.message;
    document.getElementById('camera-error').classList.remove('hidden');
  }
}
function closeCamera() {
  document.getElementById('camera-modal').classList.add('hidden');
  if (cameraReader) {
    try { cameraReader.stop().catch(()=>{}); } catch{}
    try { cameraReader.clear().catch(()=>{}); } catch{}
    setTimeout(() => { cameraReader = null; }, 100);
  }
}

              <button type="button" class="btn-icon" onclick="openCamera('Part ${idx+1} No',v=>{document.getElementById('f-partNo-${idx}').value=v;onPartField(${idx},'partNo');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>

              <button type="button" class="btn-icon" onclick="openCamera('PI No',v=>{document.getElementById('f-pi-${idx}').value=v;onPartField(${idx},'pi');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>

        <div class="form-group" style="margin-bottom:12px;max-width:none">
          <label class="form-label">Part No <span class="req">*</span></label>
          <div class="input-wrap">
            <input type="text" id="f-partNo-${idx}" placeholder="Scan or type..." value="${escHtml(part.partNo)}" ${kitLocked?'disabled':''} oninput="onPartField(${idx},'partNo')" />
            <button type="button" class="btn-icon" ${kitLocked?'disabled':''} onclick="openCamera('Part ${idx+1} No',v=>{document.getElementById('f-partNo-${idx}').value=v;onPartField(${idx},'partNo');})"><svg style="width:16px;height:16px"><use href="#ic-camera"/></svg></button>
          </div>

        ${isKit ? `
        <div class="grid-1" style="max-width:none">${renderPartBarcode(idx, 'bag', 'Bag Barcode', kitLocked)}</div>

          <div style="font-size:10px;color:var(--muted-fg);margin-bottom:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Photos for Part ${idx+1}</div>
          <div class="grid-3">
            ${renderPartPhoto(idx, 'bag', 'Bag with Part')}
            ${renderPartPhoto(idx, 'inner', 'Inner Box / Label')}
            ${renderPartPhoto(idx, 'outer', 'Outer / Carton Label')}
          </div>
        </div>
        `}
      </div>
    `).join('');

    formState.parts.forEach((p, idx) => {
      setBadge(idx, 'bag', p.bagMatch);
      if (!isKit) { setBadge(idx, 'inner', p.innerMatch); setBadge(idx, 'outer', p.outerMatch); }
    });
    if (isKit) { setKitBadge('inner', formState.cartonInnerMatch); setKitBadge('outer', formState.cartonOuterMatch); }
    setKitNoBadge(formState.cartonKitMatch);
    updateSubmit();
  }

  function renderPartBarcode(idx, which, label, disabled) {
    return `<div class="form-group">
      <div style="display:flex;align-items:center;justify-content:space-between;min-height:22px;margin-bottom:4px">

      </div>
      <div class="input-wrap">
        <input type="text" id="f-${which}-${idx}" placeholder="Scan or type..." value="${escHtml(formState.parts[idx]?.[which]||'')}" ${disabled?'disabled':''} oninput="onPartBarcode(${idx},'${which}')" />
        <button type="button" class="btn-icon" ${disabled?'disabled':''} onclick="openCamera('${label}',v=>{document.getElementById('f-${which}-${idx}').value=v;onPartBarcode(${idx},'${which}')})"><svg style="width:14px;height:14px"><use href="#ic-camera"/></svg></button>
      </div>
    </div>`;
  }
  
  function renderPartPhoto(idx, which, label) {
    const hasPhoto = formState.parts[idx]?.photos?.[which];

    return `<div class="form-group" id="photo-group-${idx}-${which}">

      <button type="button" class="photo-btn ${hasPhoto?'has-photo':''}" id="photo-btn-${idx}-${which}" onclick="document.getElementById('photo-input-${idx}-${which}').click()">
        <svg><use href="#ic-camera"/></svg><div><div class="text-sm font-bold">${label}</div><div class="text-xs text-muted mt-4">${hasPhoto?'Photo captured':'Tap to capture'}</div></div>
      </button>

    </div>`;
  }
  
  function renderKitPhoto(which, label) {
    const hasPhoto = formState.cartonPhotos[which];
    const thumbUrl = getThumbUrl(hasPhoto, 400);
    return `<div class="form-group">
      <label class="form-label">${label}</label>
      <input type="file" id="kit-photo-input-${which}" accept="image/*" capture="environment" style="display:none" onchange="handleKitPhoto('${which}',this)" />
      <label for="kit-photo-input-${which}" class="photo-btn ${hasPhoto?'has-photo':''}" id="kit-photo-btn-${which}">
        <svg><use href="#ic-camera"/></svg><div><div class="text-sm font-bold">${label}</div><div class="text-xs text-muted mt-4">${hasPhoto?'Photo captured':'Tap to capture'}</div></div>
      </label>
      <div id="kit-photo-thumb-${which}">${hasPhoto?`<img class="photo-thumb" src="${thumbUrl}" onclick="openLightbox('${escHtml(hasPhoto)}')" />`:''}</div>
    </div>`;
  }

  window.setType = function(type) { formState.cartonType = type; formState.parts = []; formState.cartonKit = ''; formState.cartonKitMatch = null; if (type === 'kit') formState.cartonPhotos = { allParts: null, innerBox: null, cartonLabel: null }; addPart(); renderForm(); };
  window.addNewPart = function() { if (formState.cartonType === 'kit' && formState.cartonKitMatch !== true) { toast('Enter and verify the KIT No first', 'error'); return; } addPart(); renderParts(); setTimeout(() => { const c = document.getElementById('parts-container'); if (c) c.lastElementChild?.scrollIntoView({ behavior: 'smooth' }); }, 50); };
  window.removePartWindow = function(idx) { removePart(idx); };
  window.onPartField = function(idx, field) { const el = document.getElementById('f-' + field + '-' + idx); if (!el) return; let val = el.value; if (field !== 'qty') val = val.trim().toUpperCase(); formState.parts[idx][field] = val; if (field !== 'qty') el.value = val; if (field === 'partNo' || field === 'pi') { lookupCache = {}; triggerLookup(idx); } };
  window.onPartBarcode = function(idx, which) {
    if (formState.cartonType === 'kit' && formState.cartonKitMatch !== true) { toast('Enter and verify the KIT No first', 'error'); return; }
    const el = document.getElementById('f-' + which + '-' + idx); if (!el) return; const val = el.value.trim().toUpperCase(); formState.parts[idx][which] = val; el.value = val; if (!val) { formState.parts[idx][which + 'Match'] = null; setBadge(idx, which, null); updateSubmit(); return; } if (val === 'NO') { formState.parts[idx][which + 'Match'] = 'no'; setBadge(idx, which, 'no'); updateSubmit(); return; } clearTimeout(lookupDebounce[idx + '-' + which]); setBadge(idx, which, 'checking'); lookupDebounce[idx + '-' + which] = setTimeout(() => doLookup(idx, which, val), 450);
  };
  window.onKitBarcode = function(which) { const el = document.getElementById('f-kit-' + which); if (!el) return; const val = el.value.trim().toUpperCase(); formState['carton' + which.charAt(0).toUpperCase() + which.slice(1)] = val; el.value = val; if (!val) { formState['carton' + which.charAt(0).toUpperCase() + which.slice(1) + 'Match'] = null; setKitBadge(which, null); updateSubmit(); return; } if (val === 'NO') { formState['carton' + which.charAt(0).toUpperCase() + which.slice(1) + 'Match'] = 'no'; setKitBadge(which, 'no'); updateSubmit(); return; } clearTimeout(lookupDebounce['kit-' + which]); setKitBadge(which, 'checking'); lookupDebounce['kit-' + which] = setTimeout(() => doKitLookup(which, val), 450); };

  window.onCartonPiField = function(val) {
    const v = String(val || '').trim().toUpperCase();
    formState.cartonPi = v;
    const el = document.getElementById('f-cartonPi');
    if (el) el.value = v;
    // Changing the PI No re-validates the KIT No/PI combo if a KIT No is already entered
    if (formState.cartonKit) triggerKitCheck();
  };

  window.onKitNoField = function(val) {
    const v = String(val || '').trim().toUpperCase();
    formState.cartonKit = v;
    const el = document.getElementById('f-cartonKit');
    if (el) el.value = v;
    if (!v) {
      formState.cartonKitMatch = null;
      setKitNoBadge(null);
      updateSubmit();
      renderForm();
      return;
    }
    triggerKitCheck();
  };

  function triggerKitCheck() {
    if (!formState.cartonKit) return;
    setKitNoBadge('checking');
    clearTimeout(lookupDebounce['kitno']);
    lookupDebounce['kitno'] = setTimeout(async () => {
      try {
        const res = await gasGet({ action: 'lookupKit', kit: formState.cartonKit, pi: formState.cartonPi || '' });
        if (res && res.found) {
          formState.cartonKitMatch = true;
          // Auto-fill PI from Master Register only if staff left it blank
          if (!formState.cartonPi && res.pi) {
            formState.cartonPi = res.pi;
          }
        } else if (res === null) {
          formState.cartonKitMatch = 'no-server';
        } else {
          formState.cartonKitMatch = false;
        }
      } catch(e) {
        formState.cartonKitMatch = 'no-server';
      }
      // Full re-render: unlocking/locking affects the shared Inner/Outer
      // barcode fields and the "Add" button, which live outside the
      // parts-container and are only rebuilt by renderForm().
      renderForm();
      // Restore focus to the KIT No field so the badge/cursor stays put.
      const kitEl = document.getElementById('f-cartonKit');
      if (kitEl) { kitEl.focus(); const len = kitEl.value.length; kitEl.setSelectionRange(len, len); }
    }, 450);
  }

  function setKitNoBadge(state) {
    const badge = document.getElementById('match-badge-kitno');
    const input = document.getElementById('f-cartonKit');
    if (!badge || !input) return;
    input.className = ''; badge.style.display = '';
    if (state === null) { badge.style.display = 'none'; return; }
    if (state === true) { badge.textContent = '\u2705 FOUND'; badge.className = 'match-badge ok'; input.className = 'match-ok'; }
    else if (state === false) { badge.textContent = '\u274C NOT FOUND'; badge.className = 'match-badge fail'; input.className = 'match-fail'; }
    else if (state === 'checking') { badge.textContent = 'CHECKING...'; badge.className = 'match-badge checking'; }
    else if (state === 'no-server') { badge.textContent = '\u26A0 SERVER OFFLINE'; badge.className = 'match-badge checking'; input.className = 'match-amber'; }
  }

  function triggerLookup(idx) { ['bag', 'inner', 'outer'].forEach(w => { const bc = formState.parts[idx][w]; if (bc && bc !== 'NO') { clearTimeout(lookupDebounce[idx + '-' + w]); setBadge(idx, w, 'checking'); lookupDebounce[idx + '-' + w] = setTimeout(() => doLookup(idx, w, bc), 400); } }); }

  async function doLookup(idx, which, barcode) {
    const part = formState.parts[idx];
    const isKit = formState.cartonType === 'kit';
    if (isKit && formState.cartonKitMatch !== true) { setBadge(idx, which, false); updateSubmit(); return; }
    const key = barcode + '|' + (part.pi || '') + '|' + (part.partNo || '') + '|' + which + '|' + (isKit ? formState.cartonKit : '');
    if (lookupCache[key] !== undefined) { applyResult(idx, which, barcode, lookupCache[key]); return; }
    try {
      const params = { action: 'lookup', barcode, pi: part.pi || '', partNo: part.partNo || '', which: which };
      if (isKit) { params.mode = 'kit'; params.kit = formState.cartonKit; }
      const res = await gasGet(params);
      if (res === null) { setBadge(idx, which, 'no-server'); updateSubmit(); return; }
      lookupCache[key] = res;
      applyResult(idx, which, barcode, res);
    } catch { setBadge(idx, which, 'no-server'); updateSubmit(); }
  }
  function applyResult(idx, which, barcode, res) {
    const part = formState.parts[idx];
    if (part[which] === 'NO') { part[which + 'Match'] = 'no'; setBadge(idx, which, 'no'); updateSubmit(); return; }
    if (res && res.found) {
      if (which === 'bag' && res.partNo && !part.partNo) {
        part.partNo = String(res.partNo).toUpperCase();
        const pn = document.getElementById('f-partNo-' + idx);
        if (pn) pn.value = part.partNo;
      }
      part[which + 'Match'] = !!res.matched;
      setBadge(idx, which, !!res.matched);
    } else {
      // PI/Part No (or KIT No/Part No) did not match Master Register
      part[which + 'Match'] = false;
      setBadge(idx, which, 'notfound');
    }
    updateSubmit();
  }

  async function doKitLookup(which, barcode) {
    if (formState.cartonKitMatch !== true) { setKitBadge(which, false); updateSubmit(); return; }
    // The shared Inner/Outer carton barcode lives on the Master Register row
    // whose Part No equals the KIT No itself (not any individual item's
    // Part No) — so that's the identity key we look up by.
    const key = barcode + '|' + formState.cartonKit + '|kit-' + which;
    if (lookupCache[key] !== undefined) { applyKitResult(which, barcode, lookupCache[key]); return; }
    try {
      const res = await gasGet({ action: 'lookup', barcode, partNo: formState.cartonKit, which: which, mode: 'kit', kit: formState.cartonKit });
      if (res === null) { setKitBadge(which, 'no-server'); updateSubmit(); return; }
      lookupCache[key] = res;
      applyKitResult(which, barcode, res);
    } catch { setKitBadge(which, 'no-server'); updateSubmit(); }
  }
  function applyKitResult(which, barcode, res) {
    const stateKey = 'carton' + which.charAt(0).toUpperCase() + which.slice(1);
    if (formState[stateKey] === 'NO') { formState[stateKey + 'Match'] = 'no'; setKitBadge(which, 'no'); updateSubmit(); return; }
    if (res && res.found) {
      formState[stateKey + 'Match'] = !!res.matched;
      setKitBadge(which, !!res.matched);
    } else {
      formState[stateKey + 'Match'] = false;
      setKitBadge(which, 'notfound');
    }
    updateSubmit();
  }

  function setBadge(idx, which, state) { const badge = document.getElementById('match-badge-' + idx + '-' + which); const input = document.getElementById('f-' + which + '-' + idx); if (!badge || !input) return; input.className = ''; badge.style.display = ''; if (state === null) { badge.style.display = 'none'; return; } if (state === true) { badge.textContent = '\u2705 MATCH'; badge.className = 'match-badge ok'; input.className = 'match-ok'; } else if (state === 'notfound') { badge.textContent = '\u274C NO PART/PI MATCH'; badge.className = 'match-badge fail'; input.className = 'match-fail'; } else if (state === false) { badge.textContent = '\u274C MISMATCH'; badge.className = 'match-badge fail'; input.className = 'match-fail'; } else if (state === 'no') { badge.textContent = 'NO BARCODE'; badge.className = 'match-badge no-bc'; input.className = 'match-amber'; } else if (state === 'checking') { badge.textContent = 'CHECKING...'; badge.className = 'match-badge checking'; } else if (state === 'no-server') { badge.textContent = '\u26A0 SERVER OFFLINE'; badge.className = 'match-badge checking'; input.className = 'match-amber'; } }
  function setKitBadge(which, state) { const badge = document.getElementById('match-badge-kit-' + which); const input = document.getElementById('f-kit-' + which); if (!badge || !input) return; input.className = ''; badge.style.display = ''; if (state === null) { badge.style.display = 'none'; return; } if (state === true) { badge.textContent = '\u2705 MATCH'; badge.className = 'match-badge ok'; input.className = 'match-ok'; } else if (state === 'notfound') { badge.textContent = '\u274C NO KIT/PART MATCH'; badge.className = 'match-badge fail'; input.className = 'match-fail'; } else if (state === false) { badge.textContent = '\u274C MISMATCH'; badge.className = 'match-badge fail'; input.className = 'match-fail'; } else if (state === 'no') { badge.textContent = 'NO BARCODE'; badge.className = 'match-badge no-bc'; input.className = 'match-amber'; } else if (state === 'checking') { badge.textContent = 'CHECKING...'; badge.className = 'match-badge checking'; } else if (state === 'no-server') { badge.textContent = '\u26A0 SERVER OFFLINE'; badge.className = 'match-badge checking'; input.className = 'match-amber'; } }

  function updateSubmit() {
    const btn = document.getElementById('btn-submit');
    const mismatchWarn = document.getElementById('mismatch-warn');
    if (!btn) return;
    let hasMismatch = false, allVerified = true;
    const isKit = formState.cartonType === 'kit';

    if (isKit && formState.cartonKitMatch !== true) {
      allVerified = false;
      if (mismatchWarn) mismatchWarn.classList.toggle('hidden', true);
      btn.disabled = true;
      return;
    }

    formState.parts.forEach(p => {
      const checks = isKit ? ['bag'] : ['bag', 'inner', 'outer'];
      checks.forEach(w => { const m = p[w + 'Match']; if (m === false) hasMismatch = true; const done = m === true || m === 'no' || m === 'error' || m === 'no-server'; if (!done) allVerified = false; });
    });
    if (isKit) { ['inner', 'outer'].forEach(w => { const m = formState['carton' + w.charAt(0).toUpperCase() + w.slice(1) + 'Match']; if (m === false) hasMismatch = true; const done = m === true || m === 'no' || m === 'error' || m === 'no-server'; if (!done) allVerified = false; }); }
    if (mismatchWarn) mismatchWarn.classList.toggle('hidden', !hasMismatch);
    btn.disabled = hasMismatch || !allVerified;
  }

  window.handlePartPhoto = async function(idx, which, input) { 
    const file = input.files[0]; 
    if (!file) return; 
    const dataUri = await compressImage(file); 
    if (!formState.parts[idx].photos) formState.parts[idx].photos = { bag: null, inner: null, outer: null }; 
    formState.parts[idx].photos[which] = dataUri; 
    const btn = document.getElementById('photo-btn-' + idx + '-' + which); 
    const thumb = document.getElementById('photo-thumb-' + idx + '-' + which); 
    if (btn) btn.classList.add('has-photo'); 
    if (thumb) thumb.innerHTML = '<img class="photo-thumb" src="' + getThumbUrl(dataUri, 400) + '" onclick="openLightbox(\'' + escHtml(dataUri) + '\')" />'; 
    input.value = ''; 
  };
  
  window.handleKitPhoto = async function(which, input) { 
    try { 
      const file = input.files[0]; 
      if (!file) return; 
      const dataUri = await compressImage(file); 
      formState.cartonPhotos[which] = dataUri; 
      const btn = document.getElementById('kit-photo-btn-' + which); 
      const thumb = document.getElementById('kit-photo-thumb-' + which); 
      if (btn) btn.classList.add('has-photo'); 
      if (thumb) thumb.innerHTML = '<img class="photo-thumb" src="' + getThumbUrl(dataUri, 400) + '" onclick="openLightbox(\'' + escHtml(dataUri) + '\')" />'; 
      input.value = ''; 
    } catch(err) { 
      toast('Photo failed: ' + err.message, 'error'); 
    } 
  };

  window.submitEntry = async function() {
    if (isSubmitting) return;
    isSubmitting = true;
    setButtonLoading('btn-submit', true);
    const cartonId = (document.getElementById('f-cartonId') || {}).value?.trim() || '';
    if (!cartonId) { toast('Carton ID is required', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }

    if (formState.cartonType === 'kit') {
      const kitNo = (document.getElementById('f-cartonKit') || {}).value?.trim().toUpperCase() || formState.cartonKit;
      const kitQty = (document.getElementById('f-cartonQty') || {}).value || formState.cartonQty;
      if (!kitNo) { toast('KIT No is required for Kit', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }
      if (formState.cartonKitMatch !== true) { toast('KIT No must be verified against Master Register (Column C) before submitting', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }
      formState.cartonKit = kitNo; formState.cartonQty = kitQty; formState.parts.forEach(p => { p.pi = formState.cartonPi || ''; p.qty = kitQty; });
    }

    const isKit = formState.cartonType === 'kit';
    for (let i = 0; i < formState.parts.length; i++) {
      const p = formState.parts[i];
      if (!p.partNo) { toast('Part ' + (i + 1) + ': Part No required', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }
      if (p.bagMatch === false) { toast('Part ' + (i + 1) + ': Bag barcode / Part No mismatch', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }
      if (!isKit && (p.innerMatch === false || p.outerMatch === false)) { toast('Part ' + (i + 1) + ': Barcode mismatch', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; }
    }
    if (isKit) { if (formState.cartonInnerMatch === false) { toast('Inner barcode mismatch', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; } if (formState.cartonOuterMatch === false) { toast('Outer barcode mismatch', 'error'); isSubmitting = false; setButtonLoading('btn-submit', false); return; } }

    const cleanBC = v => (String(v || '').toUpperCase() === 'NO') ? '' : (v || '');
    const matchBool = m => m === true || m === 'no';

    async function maybeUpload(dataUri, filename) { 
      if (!dataUri || !dataUri.startsWith('data:')) return dataUri || ''; 
      try { 
        const res = await gasPost({ action: 'uploadPhoto', base64: dataUri, filename }); 
        if (res && res.url && res.url.startsWith('http')) return res.url;
        console.warn('Photo upload failed, skipping photo');
        return '';
      } catch(e) { 
        console.warn('Photo upload error:', e.message);
        return '';
      }
    }

    let imgBagUrl, imgInnerUrl, imgCartonUrl;
    if (isKit) {
      [imgBagUrl, imgInnerUrl, imgCartonUrl] = await Promise.all([
        maybeUpload(formState.cartonPhotos.allParts, 'kit_allparts_' + cartonId + '_' + Date.now() + '.jpg'),
        maybeUpload(formState.cartonPhotos.innerBox, 'kit_inner_' + cartonId + '_' + Date.now() + '.jpg'),
        maybeUpload(formState.cartonPhotos.cartonLabel, 'kit_carton_' + cartonId + '_' + Date.now() + '.jpg'),
      ]);
    } else {
      // Upload photos for EVERY part (was previously only part 1)
      for (let i = 0; i < formState.parts.length; i++) {
        const p = formState.parts[i];
        const photos = p.photos || { bag: null, inner: null, outer: null };
        const [bagUrl, innerUrl, outerUrl] = await Promise.all([
          maybeUpload(photos.bag, 'bag_' + cartonId + '_p' + (i + 1) + '_' + Date.now() + '.jpg'),
          maybeUpload(photos.inner, 'inner_' + cartonId + '_p' + (i + 1) + '_' + Date.now() + '.jpg'),
          maybeUpload(photos.outer, 'carton_' + cartonId + '_p' + (i + 1) + '_' + Date.now() + '.jpg'),
        ]);
        // Store the real Drive URLs back on the part so they get saved in PartsJSON
        p.photos = { bag: bagUrl || '', inner: innerUrl || '', outer: outerUrl || '' };
      }
      const firstPhotos = formState.parts[0].photos || {};
      imgBagUrl = firstPhotos.bag || '';
      imgInnerUrl = firstPhotos.inner || '';
      imgCartonUrl = firstPhotos.outer || '';
    }

    const now = new Date().toISOString();
    let cartonRef;
    if (editMode && editCartonRef) {
      cartonRef = editCartonRef;
    } else {
      const nextRefRes = await gasGet({ action: 'nextCartonRef', listRef: staffSelectedList.listRef });
      cartonRef = (nextRefRes && nextRefRes.nextRef) ? nextRefRes.nextRef : 'CTN-001';
    }

    let parts;
    if (isKit) {
      const kitNo = (formState.cartonKit || '').toUpperCase();
      const kitQty = parseInt(formState.cartonQty) || 1;
      parts = formState.parts.map(p => ({ partNo: p.partNo.toUpperCase(), pi: (formState.cartonPi || '').toUpperCase(), kit: kitNo, qty: kitQty, bag: cleanBC(p.bag), inner: cleanBC(formState.cartonInner), outer: cleanBC(formState.cartonOuter), bagMatch: matchBool(p.bagMatch), innerMatch: matchBool(formState.cartonInnerMatch), outerMatch: matchBool(formState.cartonOuterMatch) }));
    } else {
      parts = formState.parts.map(p => ({ partNo: p.partNo.toUpperCase(), pi: (p.pi || '').toUpperCase(), qty: parseInt(p.qty) || 1, bag: cleanBC(p.bag), inner: cleanBC(p.inner), outer: cleanBC(p.outer), bagMatch: matchBool(p.bagMatch), innerMatch: matchBool(p.innerMatch), outerMatch: matchBool(p.outerMatch), photos: p.photos || { bag: '', inner: '', outer: '' } }));
    }

    const recordData = {
      action: 'saveRecord',
      rows: editMode && editCartonRows && editCartonRows.length ? editCartonRows : null,
      listRef: staffSelectedList.listRef,
      cartonRef: cartonRef,
      cartonId: cartonId,
      cartonType: formState.cartonType,
      cartonPI: formState.cartonPi || (parts[0] && parts[0].pi) || '',
      cartonQty: formState.cartonQty || (parts[0] && parts[0].qty) || '1',
      customer: staffSelectedList.customer,
      parts: parts,
      imgBagUrl: imgBagUrl,
      imgInnerUrl: imgInnerUrl,
      imgCartonUrl: imgCartonUrl,
      packedBy: staffSelectedList.createdBy,
      packedDate: '',
      createdAt: editMode ? undefined : now,
      status: 'pending'
    };

    if (isKit) {
      recordData.cartonInner = cleanBC(formState.cartonInner);
      recordData.cartonOuter = cleanBC(formState.cartonOuter);
      recordData.cartonInnerMatch = matchBool(formState.cartonInnerMatch);
      recordData.cartonOuterMatch = matchBool(formState.cartonOuterMatch);
    }

    const res = await gasPost(recordData);
    if (!res || !res.success) {
      toast('Save failed: ' + (res?.error || 'Unknown error'), 'error');
      isSubmitting = false;
      setButtonLoading('btn-submit', false);
      return;
    }

    const wasEditMode = editMode;
    resetForm();
    localStorage.removeItem('mg_lists_cache');
    localStorage.removeItem('mg_lists_cache_time');
    editMode = false;
    editCartonRows = [];
    editCartonRef = '';
    renderForm();
    toast(wasEditMode ? 'Carton updated and resubmitted!' : 'Saved \u2014 ' + cartonRef + '. Ready for next carton!', 'success');
    isSubmitting = false;
    setButtonLoading('btn-submit', false);
  };

  window.refreshLists = async function() {
    localStorage.removeItem('mg_lists_cache');
    localStorage.removeItem('mg_lists_cache_time');
    invalidateCache();
    toast('Refreshing lists...', 'success');
    await load();
    toast('Lists updated', 'success');
  };

  load();
})();
</script>
</body>
</html>
