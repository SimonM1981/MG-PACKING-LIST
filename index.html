<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Packing Lists — MG Packing</title>
<link rel="stylesheet" href="shared.css"><script src="shared.js"></script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div><div class="brand-name">MG Packing</div><div class="brand-sub">System v3.3</div></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">
      <svg class="moon"><use href="#ic-moon"/></svg>
      <svg class="sun"><use href="#ic-sun"/></svg>
    </button>
    <div class="section-label">Staff</div>
    <nav>
      <a href="#" data-page="index" class="active"><svg><use href="#ic-list"/></svg>Packing Lists</a>
      <a href="#" data-page="staff" onclick="goTo('staff');return false"><svg><use href="#ic-plus"/></svg>Staff Entry</a>
    </nav>
    <div class="section-label">Supervisor</div>
    <nav>
      <a href="#" data-page="checker" onclick="goTo('checker');return false"><svg><use href="#ic-check-sq"/></svg>Checker View</a>
      <a href="#" data-page="transfer" onclick="goTo('transfer');return false"><svg><use href="#ic-transfer"/></svg>Transfer</a>
      <a href="#" data-page="rejects" class="danger" onclick="goTo('rejects');return false"><svg><use href="#ic-alert"/></svg>Reject List</a>
    </nav>
    <div class="section-label">Tools</div>
    <nav>
      <a href="#" data-page="missing" onclick="goTo('missing');return false"><svg><use href="#ic-missing"/></svg>Missing Cartons</a>
    </nav>
    <div style="flex:1"></div>
  </div>
  <div id="main">
    <div class="page-header">
      <div>
        <div class="page-title"><svg><use href="#ic-list"/></svg>Packing Lists</div>
        <div class="page-subtitle">Create or select a list, then add carton entries.</div>
      </div>
      <button class="btn btn-primary" onclick="showCreateList()">
        <svg><use href="#ic-plus"/></svg>New List
      </button>
    </div>
    <div id="create-list-form" class="hidden"></div>
    <div id="lists-count" class="text-xs text-muted" style="margin-bottom:10px"></div>
    <div class="table-wrap">
      <table class="table-responsive">
        <thead><tr><th>Ref</th><th>Customer</th><th>Packed By</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody id="lists-tbody"><tr><td colspan="6"><div class="empty-state"><div class="spinner" style="width:28px;height:28px;margin:0 auto 12px;display:block"></div><p>Loading packing lists...</p></div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function() {
  initSidebar('index');
  let isSubmitting = false;
  var LISTS = [];

  async function loadLists() {
    let cached = [];
    try {
      const c = localStorage.getItem('mg_lists_cache');
      if (c) cached = JSON.parse(c);
    } catch(e){}
    if (cached.length > 0) {
      LISTS = cached;
      renderLists();
    }
    let fresh = null;
    try { fresh = await gasGet({ action: 'packingLists' }); } catch(e){}
    if (fresh && fresh.lists) {
      LISTS = fresh.lists;
      try { localStorage.setItem('mg_lists_cache', JSON.stringify(LISTS)); localStorage.setItem('mg_lists_cache_time', String(Date.now())); } catch(e){}
      renderLists();
    } else if (!cached.length) {
      LISTS = [];
      renderLists();
    }
  }

  function renderLists() {
    document.getElementById('lists-count').textContent = LISTS.length + ' list' + (LISTS.length !== 1 ? 's' : '');
    const tbody = document.getElementById('lists-tbody');
    if (LISTS.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><svg><use href="#ic-list"/></svg><p>No packing lists yet \u2014 click New List</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = LISTS.map(l => {
      const statusClass = l.status === 'open' ? 'badge-green' :
                          l.status === 'completed' ? 'badge-blue' :
                          l.status === 'has rejected' ? 'badge-red' :
                          l.status === 'partial' ? 'badge-amber' : 'badge-muted';
      return `
      <tr class="clickable" onclick="goToList('${l.listRef}')">
        <td data-label="Ref" class="font-bold text-primary">${escHtml(l.listRef)}</td>
        <td data-label="Customer">${escHtml(l.customer)}</td>
        <td data-label="Packed By"><div class="text-sm">${escHtml(l.createdBy)}</div><div class="text-xs text-muted">${escHtml(l.team)}</div></td>
        <td data-label="Status"><span class="badge ${statusClass}">${escHtml(l.status)}</span></td>
        <td data-label="Created" class="text-xs text-muted">${fmtDate(l.createdAt)}</td>
        <td><svg style="width:14px;height:14px;color:var(--muted-fg)"><use href="#ic-arrow-right"/></svg></td>
      </tr>`;
    }).join('');
  }

  window.showCreateList = function() {
    const el = document.getElementById('create-list-form');
    el.classList.remove('hidden');
    el.innerHTML = `
      <div class="form-panel" style="margin-bottom:16px">
        <div class="form-panel-header primary-bg">
          <span class="font-bold text-primary text-sm" style="text-transform:uppercase;letter-spacing:.07em">
            <svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><use href="#ic-plus"/></svg>Create New Packing List
          </span>
          <button class="btn-icon" onclick="document.getElementById('create-list-form').classList.add('hidden');document.getElementById('create-list-form').innerHTML=''"><svg style="width:12px;height:12px"><use href="#ic-x"/></svg></button>
        </div>
        <div class="form-panel-body">
          <div class="grid-3" style="margin-bottom:14px">
            <div class="form-group">
              <label class="form-label">Customer Name <span class="req">*</span></label>
              <input type="text" id="cl-customer" placeholder="Enter customer..." autofocus />
            </div>
            <div class="form-group">
              <label class="form-label">Packed By <span class="req">*</span></label>
              <input type="text" id="cl-by" placeholder="Staff name or ID..." />
            </div>
            <div class="form-group">
              <label class="form-label">Team <span class="req">*</span></label>
              <input type="text" id="cl-team" placeholder="Team A / Team B..." />
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border)">
            <button class="btn btn-outline" onclick="document.getElementById('create-list-form').classList.add('hidden');document.getElementById('create-list-form').innerHTML=''">Cancel</button>
            <button class="btn btn-primary" id="btn-create-list" onclick="submitCreateList()">
              <svg><use href="#ic-arrow-right"/></svg>Create & Open
            </button>
          </div>
        </div>
      </div>`;
  };

  window.submitCreateList = async function() {
    if (isSubmitting) return;
    isSubmitting = true;
    setButtonLoading('btn-create-list', true);
    const customer = document.getElementById('cl-customer').value.trim();
    const createdBy = document.getElementById('cl-by').value.trim();
    const team = document.getElementById('cl-team').value.trim();
    if (!customer || !createdBy || !team) {
      toast('Please fill all fields', 'error');
      isSubmitting = false; setButtonLoading('btn-create-list', false); return;
    }
    const res = await gasCreatePackingList({ id: Date.now(), customer, createdBy, team });
    if (!res || !res.success) {
      toast('Failed to create packing list.', 'error');
      isSubmitting = false; setButtonLoading('btn-create-list', false); return;
    }
    toast('Packing list ' + res.listRef + ' created!', 'success');
    isSubmitting = false;
    goToList(res.listRef);
  };

  async function gasGetPackingLists() {
    const res = await gasGet({ action: 'packingLists' });
    return (res && res.lists) ? res.lists : [];
  }
  async function gasCreatePackingList(data) {
    return await gasPost({ action: 'createPackingList', ...data });
  }

  loadLists();
})();
</script>
</body>
</html>
