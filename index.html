<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Packing Lists — MG Packing</title>
<style>
[data-theme="dark"] {
  --bg:#0d0d0d;--bg-elevated:#121318;--card:#16181c;--border:#262830;--muted:#1e2028;
  --text:#ececec;--text-secondary:#a0a4b0;--muted-fg:#7a7f8a;--primary:#5B7CF5;--primary-dim:rgba(91,124,245,.14);
  --primary-border:rgba(91,124,245,.35);--danger:#ef4444;--danger-dim:rgba(239,68,68,.12);
  --danger-border:rgba(239,68,68,.35);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
  --amber-border:rgba(245,158,11,.35);--blue:#5B7CF5;--blue-dim:rgba(91,124,245,.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.35);
  --input-bg:#16181c;--overlay:rgba(0,0,0,.88);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);--shadow:0 8px 32px rgba(0,0,0,.4);
  --hover-overlay:rgba(255,255,255,.04);
}
[data-theme="light"] {
  --bg:#f1f3f7;--bg-elevated:#ffffff;--card:#ffffff;--border:#d8dbe3;--muted:#eef0f4;
  --text:#1a1d29;--text-secondary:#4a4f5e;--muted-fg:#6b7280;--primary:#3b5bdb;--primary-dim:rgba(59,91,219,.1);
  --primary-border:rgba(59,91,219,.25);--danger:#dc2626;--danger-dim:rgba(220,38,38,.08);
  --danger-border:rgba(220,38,38,.25);--amber:#d97706;--amber-dim:rgba(217,119,6,.08);
  --amber-border:rgba(217,119,6,.25);--blue:#3b5bdb;--blue-dim:rgba(59,91,219,.08);
  --green:#16a34a;--green-dim:rgba(22,163,74,.08);--green-border:rgba(22,163,74,.25);
  --input-bg:#ffffff;--overlay:rgba(0,0,0,.65);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);--shadow:0 8px 32px rgba(0,0,0,.12);
  --hover-overlay:rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--font-mono:'SF Mono',Monaco,'Cascadia Code',monospace;--radius:14px;--radius-sm:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background-color .25s ease,color .2s ease}
#app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
#sidebar{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;box-shadow:var(--shadow-sm);transition:background-color .25s ease,border-color .25s ease}
#main{flex:1;overflow-y:auto;padding:24px 28px;-webkit-overflow-scrolling:touch;background:var(--bg);transition:background-color .25s ease;min-height:100vh}
@media(max-width:768px){
  #app{flex-direction:column;height:100vh;height:100dvh}
  #sidebar{position:fixed;bottom:0;left:0;right:0;width:100%;flex-direction:row;flex-wrap:nowrap;height:64px;z-index:50;border-right:none;border-top:1px solid var(--border);padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(255,255,255,.92);backdrop-filter:blur(10px)}
  [data-theme="dark"] #sidebar{background:rgba(22,24,28,.95)}
  #sidebar .brand,#sidebar .section-label{display:none}
  #sidebar .theme-toggle{position:static;margin:0 8px;align-self:center;flex-shrink:0}
  #sidebar nav{display:flex;flex-direction:row;flex:1;justify-content:space-around;align-items:center;min-width:max-content;padding:0 8px}
  #sidebar nav a{flex-direction:column;gap:3px;padding:8px 8px;margin:0;font-size:10px;letter-spacing:.04em;white-space:nowrap;border-bottom:3px solid transparent}
  #sidebar nav a svg{width:20px;height:20px}
  #main{padding:16px 16px 80px 16px}
}
.brand{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.brand-name{font-weight:800;font-size:17px;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);font-family:var(--font-mono)}
.brand-sub{font-size:10px;color:var(--muted-fg);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.section-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-fg);padding:16px 16px 6px;font-weight:600}
nav a{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;margin:3px 10px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-fg);transition:all .15s;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;text-decoration:none;background:transparent}
nav a svg{width:16px;height:16px;flex-shrink:0}
nav a:hover{background:var(--muted);color:var(--text)}
nav a.active{background:var(--primary-dim);color:var(--primary);border-bottom-color:var(--primary)}
nav a.danger{color:var(--danger)}
.theme-toggle{position:relative;width:44px;height:24px;border-radius:12px;background:var(--muted);border:1.5px solid var(--border);cursor:pointer;transition:all .25s ease;display:flex;align-items:center;padding:0 3px;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--primary);transition:transform .3s cubic-bezier(.4,0,.2,1),background .25s ease;box-shadow:0 1px 4px rgba(0,0,0,.3)}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);background:#f59e0b}
.theme-toggle svg{position:absolute;width:11px;height:11px;transition:opacity .25s ease;pointer-events:none}
.theme-toggle .moon{left:5px;opacity:1}[data-theme="light"] .theme-toggle .moon{opacity:0}
.theme-toggle .sun{right:5px;opacity:0}[data-theme="light"] .theme-toggle .sun{opacity:1}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap;background:transparent}
.page-title{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}
.page-subtitle{font-size:12px;color:var(--muted-fg);margin-top:4px}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid}
.badge-green{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.badge-red{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.35)}
.badge-muted{background:var(--muted);color:var(--muted-fg);border-color:var(--border)}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted-fg);background:var(--bg)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--muted-fg);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.text-primary{color:var(--primary)}.text-danger{color:var(--danger)}.text-amber{color:var(--amber)}.text-green{color:var(--green)}.text-muted{color:var(--muted-fg)}
.text-sm{font-size:12px}.text-xs{font-size:11px}.font-bold{font-weight:700}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab-btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1.5px solid var(--border);background:transparent;color:var(--muted-fg);cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border)}
.tab-btn:hover:not(.active){background:var(--muted);color:var(--text)}

/* List Cards */
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .15s;text-decoration:none;display:block;color:var(--text)}
.list-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary-border)}
.list-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-card-ref{font-family:var(--font-mono);font-size:16px;font-weight:800;color:var(--primary)}
.list-card-meta{font-size:12px;color:var(--muted-fg);line-height:1.6}
.list-card-meta strong{color:var(--text);font-weight:600}
.list-card-stats{display:flex;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.list-card-stat{text-align:center}
.list-card-stat .num{font-size:18px;font-weight:700;color:var(--text);display:block}
.list-card-stat .lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-fg);margin-top:2px}

/* Button */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;transition:all .15s;cursor:pointer;touch-action:manipulation;min-height:36px;background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-green{background:var(--green);color:#fff}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);transform:translateY(20px);transition:transform .25s ease}
.modal-overlay.active .modal-content{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--muted)}
.modal-header h3{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.modal-body{padding:18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--muted)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--primary)}
.close-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
.close-btn:hover{border-color:var(--danger);color:var(--danger)}
.toast{position:fixed;top:20px;right:20px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;box-shadow:var(--shadow);font-size:13px;font-weight:600;transform:translateX(120%);transition:transform .3s ease}
.toast.show{transform:translateX(0)}
.toast-success{border-left:3px solid var(--green)}
.toast-error{border-left:3px solid var(--danger)}
</style>
</head>

<!-- Create Packing List Modal -->
<div id="createModal" class="modal-overlay" onclick="closeCreateModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">

      <h3><svg width="16" height="16"><use href="#ic-plus"/></svg> Create Packing List</h3>

<script>
'use strict';

var GAS_URL = 'https://script.google.com/macros/s/AKfycbytodVpWD4hc0W1mpQPzIe9pgK4OlPA_UVgC9mh1BYRtxUkEhhuninMLflFRwFvP4xZ7g/exec';
var ALL_LISTS = [];

(function initTheme() {
  const saved = localStorage.getItem('mg-theme');
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mg-theme', next);
}

function initSidebar(currentPage) {
  document.querySelectorAll('nav a[data-page]').forEach(a => {
    if (a.dataset.page === currentPage) a.classList.add('active');
  });
}

function escHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function gasGet(params) {
  if (!GAS_URL) return null;
  const url = GAS_URL + '?' + new URLSearchParams(params);
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 25000);
    const r = await fetch(url, { signal: ctrl.signal, redirect: 'follow' });
    clearTimeout(t);
    const txt = await r.text();
    if (!txt || !txt.trim()) return null;
    if (txt.trim().startsWith('<')) return null;
    try { return JSON.parse(txt); } catch { return null; }
  } catch(err) { return null; }
}

async function gasPost(params) {
  if (!GAS_URL) return null;
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 25000);
    const r = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(params),
      signal: ctrl.signal,
      redirect: 'follow'
    });
    clearTimeout(t);
    const txt = await r.text();
    if (!txt || !txt.trim()) return null;
    if (txt.trim().startsWith('<')) return null;
    try { return JSON.parse(txt); } catch { return null; }
  } catch(err) { return null; }
}

function listStatusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('rejected')) return '<span class="badge badge-red">HAS REJECTED</span>';
  if (s.includes('completed')) return '<span class="badge badge-green">COMPLETED</span>';
  if (s.includes('partial')) return '<span class="badge badge-blue">PARTIAL</span>';
  if (s.includes('verified')) return '<span class="badge badge-green">VERIFIED</span>';
  if (s.includes('open')) return '<span class="badge badge-amber">OPEN</span>';
  return '<span class="badge badge-muted">' + escHtml(status || 'UNKNOWN') + '</span>';
}

function fmtDate(ts) {
  if (!ts) return '\u2014';
  const d = new Date(ts);
  if (isNaN(d)) return String(ts).slice(0,10);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type || 'success');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Modal Functions
function openCreateModal() {
  document.getElementById('newCustomer').value = '';
  document.getElementById('newCreatedBy').value = '';
  document.getElementById('newTeam').value = '';
  document.getElementById('createModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('newCustomer').focus(), 100);
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('active');
  document.body.style.overflow = '';
}

function closeCreateModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeCreateModal();
}

async function submitCreateList() {
  const customer = document.getElementById('newCustomer').value.trim();
  const createdBy = document.getElementById('newCreatedBy').value.trim();
  const team = document.getElementById('newTeam').value.trim();

  if (!customer) { showToast('Customer is required', 'error'); return; }
  if (!createdBy) { showToast('Created By is required', 'error'); return; }

  const res = await gasPost({ action: 'createPackingList', customer: customer, createdBy: createdBy, team: team });
  if (res && res.success) {
    showToast('Packing list ' + res.listRef + ' created!', 'success');
    closeCreateModal();
    setTimeout(() => location.reload(), 600);
  } else {
    showToast(res && res.error ? res.error : 'Failed to create list', 'error');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeCreateModal();
  if (e.key === 'Enter' && document.getElementById('createModal').classList.contains('active')) {
    submitCreateList();
  }
});

function renderLists(tab) {
  const container = document.getElementById('lists-grid');
  if (!container) return;
  
  const filtered = tab === 'completed' 
    ? ALL_LISTS.filter(l => (l.status || '').toLowerCase().includes('completed'))
    : ALL_LISTS.filter(l => !(l.status || '').toLowerCase().includes('completed'));
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No packing lists in this section.</div>';
    return;
  }
  
  let html = '';
  for (const list of filtered) {
    html += `<a href="list.html?ref=${encodeURIComponent(list.listRef)}" class="list-card">
      <div class="list-card-header">
        <span class="list-card-ref">${escHtml(list.listRef)}</span>
        ${listStatusBadge(list.status)}
      </div>
      <div class="list-card-meta">
        <div><strong>Customer:</strong> ${escHtml(list.customer || '')}</div>
        <div><strong>Created By:</strong> ${escHtml(list.createdBy || '')}</div>
        <div><strong>Team:</strong> ${escHtml(list.team || '')}</div>
        <div><strong>Date:</strong> ${fmtDate(list.timestamp)}</div>
      </div>
      <div class="list-card-stats">
        <div class="list-card-stat"><span class="num">${list.cartonCount || 0}</span><span class="lbl">Cartons</span></div>
        <div class="list-card-stat"><span class="num">${list.partCount || 0}</span><span class="lbl">Parts</span></div>
      </div>
    </a>`;
  }
  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="' + tab + '"]').classList.add('active');
  renderLists(tab);
}

(async function() {
  initSidebar('index');

  const res = await gasGet({ action: 'packingLists' });
  ALL_LISTS = (res && res.lists) ? res.lists : [];

  const completedCount = ALL_LISTS.filter(l => (l.status || '').toLowerCase().includes('completed')).length;
  const underCount = ALL_LISTS.length - completedCount;

  let html = `
  <div class="page-header">
    <div>
      <div class="page-title">Packing Lists</div>
      <div class="page-subtitle">${ALL_LISTS.length} total list${ALL_LISTS.length!==1?'s':''}</div>
    </div>
    <button class="btn btn-green" onclick="openCreateModal()"><svg width="14" height="14"><use href="#ic-plus"/></svg> New Packing List</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="under" onclick="switchTab('under')">Under Packing (${underCount})</button>
    <button class="tab-btn" data-tab="completed" onclick="switchTab('completed')">Completed (${completedCount})</button>
  </div>

  <div id="lists-grid" class="list-grid">
    <!-- Populated by JS -->
  </div>`;

  document.getElementById('index-content').innerHTML = html;
  renderLists('under');
})();
</script>
</body>
</html>
