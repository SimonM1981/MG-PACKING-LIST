<script>
'use strict';

// URL configuration
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyM-KW4verG3fuqT7JEfsg1292ZXNan1Kbi5SsW3PYn7ZplU-waGJJqkGXvEEs8Z-JhNg/exec';

(function initTheme() {
  const saved = localStorage.getItem('mg-theme');
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mg-theme', next);
}

function initSidebar(currentPage) {
  document.querySelectorAll('nav a[data-page]').forEach(a => {
    if (a.dataset.page === currentPage) a.classList.add('active');
  });
}

function escHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function gasGet(params) {
  if (!GAS_URL) return null;
  const url = GAS_URL + '?' + new URLSearchParams(params);
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 25000);
    const r = await fetch(url, { signal: ctrl.signal, redirect: 'follow' });
    clearTimeout(t);
    const txt = await r.text();
    if (!txt || !txt.trim()) return null;
    if (txt.trim().startsWith('<')) return null;
    try { return JSON.parse(txt); } catch { return null; }
  } catch(err) { return null; }
}

function getThumbUrl(url, size) {
  if (!url) return '';
  if (url.startsWith('data:')) return url;
  if (url.includes('drive.google.com') || url.includes('googleusercontent')) {
    const m = url.match(/[-\w]{25,}/);
    if (m) return 'https://drive.google.com/thumbnail?id=' + m[0] + '&sz=w' + size;
  }
  return url;
}

function statusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('rejected')) return '<span class="badge badge-red">REJECTED</span>';
  if (s.includes('verified')) return '<span class="badge badge-green">VERIFIED</span>';
  if (s.includes('pending')) return '<span class="badge badge-amber">PENDING</span>';
  if (s.includes('partial')) return '<span class="badge badge-blue">PARTIAL</span>';
  if (s.includes('completed')) return '<span class="badge badge-green">COMPLETED</span>';
  return '<span class="badge badge-muted">' + escHtml(status || 'UNKNOWN') + '</span>';
}

function listStatusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('rejected')) return '<span class="badge badge-red">HAS REJECTED</span>';
  if (s.includes('completed')) return '<span class="badge badge-green">COMPLETED</span>';
  if (s.includes('partial')) return '<span class="badge badge-blue">PARTIAL</span>';
  if (s.includes('open')) return '<span class="badge badge-amber">OPEN</span>';
  return '<span class="badge badge-muted">' + escHtml(status || 'UNKNOWN') + '</span>';
}

function barcodeDots(rec) {
  const bag = rec.bagMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.bag ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  const inner = rec.innerMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.inner ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  const outer = rec.outerMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.outer ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  return 'B' + bag + ' I' + inner + ' O' + outer;
}

function fmtDate(ts) {
  if (!ts) return '\u2014';
  const d = new Date(ts);
  if (isNaN(d)) return String(ts).slice(0,10);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// Optimized Data Load Engine
(async function() {
  initSidebar('index');

  const params = new URLSearchParams(location.search);
  const listRef = params.get('ref') || '';

  if (!listRef) {
    document.getElementById('list-content').innerHTML = '<div class="empty-state">No packing list specified.</div>';
    return;
  }

  // OPTIMIZATION: We fetch the specific list structural fields dynamically from the cartons array context or fallback cleanly 
  const cartonsRes = await gasGet({ action: 'cartons', listRef: listRef });
  const cartons = (cartonsRes && cartonsRes.cartons) ? cartonsRes.cartons : [];

  // Fallback structural object layout to ensure layout matches your dashboard layout completely
  let metaInfo = {
    customer: cartons.length > 0 ? (cartons[0].customer || "Unknown Customer") : "No Data Available",
    createdBy: cartons.length > 0 ? (cartons[0].packedBy || "Staff Member") : "N/A",
    team: cartons.length > 0 ? "Warehouse Team" : "N/A",
    status: "open"
  };

  // Dynamically evaluate modern context flag status from pulled context array rows
  if (cartons.length > 0) {
    const hasRejected = cartons.some(c => (c.status || '').toLowerCase().includes('rejected'));
    const allVerified = cartons.every(c => (c.status || '').toLowerCase().includes('verified'));
    const hasPending  = cartons.some(c => {
      const s = (c.status || '').toLowerCase();
      return !s || s === '' || s === 'pending';
    });

    if (hasRejected)      metaInfo.status = 'rejected';
    else if (allVerified) metaInfo.status = 'completed';
    else if (!hasPending) metaInfo.status = 'partial';
  }

  const totalParts = cartons.reduce((sum, c) => {
    if (c.parts && c.parts.length) return sum + c.parts.length;
    return sum + 1;
  }, 0);

  let html = `
  <div class="page-header" style="align-items:center">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="index.html" class="back-btn"><svg style="width:16px;height:16px"><use href="#ic-back"/></svg></a>
      <div>
        <div class="page-title"><svg><use href="#ic-list"/></svg>${escHtml(listRef)}</div>
        <div class="page-subtitle">${escHtml(metaInfo.customer)} \u2014 ${cartons.length} carton${cartons.length!==1?'s':''} \u2014 ${totalParts} part${totalParts!==1?'s':''} total</div>
      </div>
    </div>
    <div>${listStatusBadge(metaInfo.status)}</div>
  </div>

  <div class="stat-grid" style="margin-bottom:22px">
    <div class="stat-card">
      <div class="label">Customer</div>
      <div class="value text-primary">${escHtml(metaInfo.customer)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Packed By</div>
      <div class="value">${escHtml(metaInfo.createdBy || '')}</div>
    </div>
    <div class="stat-card">
      <div class="label">Team</div>
      <div class="value">${escHtml(metaInfo.team || '')}</div>
    </div>
  </div>`;

  if (cartons.length === 0) {
    html += `<div class="empty-state">No cartons in this packing list yet.</div>`;
  } else {
    html += `<div class="table-wrap"><table>
      <thead>
        <tr>
          <th>Carton ID</th>
          <th>P/I No.</th>
          <th>Part No.</th>
          <th>Qty</th>
          <th>Barcodes</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>`;
      
    for (const c of cartons) {
      const partNoDisplay = c.parts && c.parts.length > 1 
        ? escHtml(c.parts[0].partNo || '') + ' <span class="text-muted">+' + (c.parts.length - 1) + ' MORE</span>'
        : escHtml(c.partNo || '');
      
      const rowClass = (c.status || '').toLowerCase().includes('rejected') ? 'rejected' : (c.status || '').toLowerCase().includes('verified') ? 'verified' : '';
      
      html += `<tr class="${rowClass}">
        <td><strong class="text-primary">${escHtml(c.cartonId)}</strong></td>
        <td>${escHtml(c.pi || c.cartonPI || '')}</td>
        <td>${partNoDisplay}</td>
        <td>${escHtml(c.qty || c.cartonQty || '1')}</td>
        <td>${barcodeDots(c)}</td>
        <td>${statusBadge(c.status)}</td>
        <td class="text-muted">${fmtDate(c.timestamp)}</td>
      </tr>`;
    }
    
    html += `</tbody></table></div>`;
  }

  document.getElementById('list-content').innerHTML = html;
})();
</script>
