<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Packing List — MG Packing</title>
<style>
[data-theme="dark"] {
  --bg:#0d0d0d;--bg-elevated:#121318;--card:#16181c;--border:#262830;--muted:#1e2028;
  --text:#ececec;--text-secondary:#a0a4b0;--muted-fg:#7a7f8a;--primary:#5B7CF5;--primary-dim:rgba(91,124,245,.14);
  --primary-border:rgba(91,124,245,.35);--danger:#ef4444;--danger-dim:rgba(239,68,68,.12);
  --danger-border:rgba(239,68,68,.35);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
  --amber-border:rgba(245,158,11,.35);--blue:#5B7CF5;--blue-dim:rgba(91,124,245,.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.35);
  --input-bg:#16181c;--overlay:rgba(0,0,0,.88);--scan-bg:#000;
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);--shadow:0 8px 32px rgba(0,0,0,.4);
  --toast-bg:#16181c;--hover-overlay:rgba(255,255,255,.04);
}
[data-theme="light"] {
  --bg:#f1f3f7;--bg-elevated:#ffffff;--card:#ffffff;--border:#d8dbe3;--muted:#eef0f4;
  --text:#1a1d29;--text-secondary:#4a4f5e;--muted-fg:#6b7280;--primary:#3b5bdb;--primary-dim:rgba(59,91,219,.1);
  --primary-border:rgba(59,91,219,.25);--danger:#dc2626;--danger-dim:rgba(220,38,38,.08);
  --danger-border:rgba(220,38,38,.25);--amber:#d97706;--amber-dim:rgba(217,119,6,.08);
  --amber-border:rgba(217,119,6,.25);--blue:#3b5bdb;--blue-dim:rgba(59,91,219,.08);
  --green:#16a34a;--green-dim:rgba(22,163,74,.08);--green-border:rgba(22,163,74,.25);
  --input-bg:#ffffff;--overlay:rgba(0,0,0,.65);--scan-bg:#1a1d29;
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);--shadow:0 8px 32px rgba(0,0,0,.12);
  --toast-bg:#ffffff;--hover-overlay:rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--font-mono:'SF Mono',Monaco,'Cascadia Code',monospace;--radius:14px;--radius-sm:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background-color .25s ease,color .2s ease}
#app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
#sidebar{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;box-shadow:var(--shadow-sm);transition:background-color .25s ease,border-color .25s ease}
#main{flex:1;overflow-y:auto;padding:24px 28px;-webkit-overflow-scrolling:touch;background:var(--bg);transition:background-color .25s ease;min-height:100vh}
@media(max-width:768px){
  #app{flex-direction:column;height:100vh;height:100dvh}
  #sidebar{position:fixed;bottom:0;left:0;right:0;width:100%;flex-direction:row;flex-wrap:nowrap;height:64px;z-index:50;border-right:none;border-top:1px solid var(--border);padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(255,255,255,.92);backdrop-filter:blur(10px)}
  [data-theme="dark"] #sidebar{background:rgba(22,24,28,.95)}
  #sidebar .brand,#sidebar .section-label{display:none}
  #sidebar .theme-toggle{position:static;margin:0 8px;align-self:center;flex-shrink:0}
  #sidebar nav{display:flex;flex-direction:row;flex:1;justify-content:space-around;align-items:center;min-width:max-content;padding:0 8px}
  #sidebar nav a{flex-direction:column;gap:3px;padding:8px 8px;margin:0;font-size:10px;letter-spacing:.04em;white-space:nowrap;border-bottom:3px solid transparent}
  #sidebar nav a svg{width:20px;height:20px}
  #main{padding:16px 16px 80px 16px}
}
.brand{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.brand-name{font-weight:800;font-size:17px;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);font-family:var(--font-mono)}
.brand-sub{font-size:10px;color:var(--muted-fg);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.section-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-fg);padding:16px 16px 6px;font-weight:600}
nav a{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;margin:3px 10px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-fg);transition:all .15s;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;text-decoration:none;background:transparent}
nav a svg{width:16px;height:16px;flex-shrink:0}
nav a:hover{background:var(--muted);color:var(--text)}
nav a.active{background:var(--primary-dim);color:var(--primary);border-bottom-color:var(--primary)}
nav a.danger{color:var(--danger)}
.theme-toggle{position:relative;width:44px;height:24px;border-radius:12px;background:var(--muted);border:1.5px solid var(--border);cursor:pointer;transition:all .25s ease;display:flex;align-items:center;padding:0 3px;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--primary);transition:transform .3s cubic-bezier(.4,0,.2,1),background .25s ease;box-shadow:0 1px 4px rgba(0,0,0,.3)}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);background:#f59e0b}
.theme-toggle svg{position:absolute;width:11px;height:11px;transition:opacity .25s ease;pointer-events:none}
.theme-toggle .moon{left:5px;opacity:1}[data-theme="light"] .theme-toggle .moon{opacity:0}
.theme-toggle .sun{right:5px;opacity:0}[data-theme="light"] .theme-toggle .sun{opacity:1}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap;background:transparent}
.page-title{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}
.page-subtitle{font-size:12px;color:var(--muted-fg);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.stat-card .label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-fg);font-weight:600}
.stat-card .value{font-size:18px;font-weight:700;margin-top:4px;color:var(--text)}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid}
.badge-green{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.badge-red{background:var(--danger-dim);color:var(--danger);border-color:var(--danger-border)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.35)}
.badge-muted{background:var(--muted);color:var(--muted-fg);border-color:var(--border)}
.table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;background:var(--card)}
thead{background:var(--muted)}
th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg);padding:10px 12px;text-align:left;white-space:nowrap;font-weight:700;background:var(--muted)}
td{padding:10px 12px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle;color:var(--text);background:var(--card);cursor:pointer}
tr:hover td{background:var(--hover-overlay)}
tr.rejected td{border-left:3px solid var(--danger);background:var(--card)}
tr.verified td{border-left:3px solid var(--green);background:var(--card)}
tr.selected td{background:rgba(91,124,245,.15)}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted-fg);background:var(--bg)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--muted-fg);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;transition:all .15s;cursor:pointer;touch-action:manipulation;min-height:36px;background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-disabled{background:var(--muted);color:var(--muted-fg);cursor:not-allowed;opacity:0.6}
.text-primary{color:var(--primary)}.text-danger{color:var(--danger)}.text-amber{color:var(--amber)}.text-green{color:var(--green)}.text-muted{color:var(--muted-fg)}
.text-sm{font-size:12px}.text-xs{font-size:11px}.font-bold{font-weight:700}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mb-16{margin-bottom:16px}
.hidden{display:none!important}
.back-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}
.barcode-dot{font-size:11px;font-weight:700}
.barcode-dot.ok{color:var(--green)}.barcode-dot.fail{color:var(--danger)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);transform:translateY(20px);transition:transform .25s ease}
.modal-overlay.active .modal-content{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--muted)}
.modal-header h3{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.modal-body{padding:18px}
.close-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
.close-btn:hover{border-color:var(--danger);color:var(--danger)}

/* Checker Card Style */
.checker-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.checker-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.checker-card-id{font-family:var(--font-mono);font-size:18px;font-weight:800;color:var(--primary)}
.checker-section{margin-bottom:14px}
.checker-section-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-fg);font-weight:700;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.checker-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.checker-row:last-child{border-bottom:none}
.checker-row .label{color:var(--muted-fg);font-size:12px}
.checker-row .value{font-weight:600;color:var(--text)}
.barcode-checker{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.barcode-checker .bc-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.barcode-checker .bc-icon.ok{background:var(--green-dim);color:var(--green)}
.barcode-checker .bc-icon.fail{background:var(--danger-dim);color:var(--danger)}
.barcode-checker .bc-icon.na{background:var(--muted);color:var(--muted-fg)}
.barcode-checker .bc-info{flex:1}
.barcode-checker .bc-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700}
.barcode-checker .bc-value{font-family:var(--font-mono);font-size:13px;word-break:break-all}
.barcode-checker .bc-status{font-size:11px;font-weight:700}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
.photo-grid img{width:100%;height:100px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:transform .15s}
.photo-grid img:hover{transform:scale(1.03)}
.parts-list{display:flex;flex-direction:column;gap:6px}
.part-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.part-row .part-no{font-family:var(--font-mono);font-size:13px;font-weight:600}
.part-row .part-qty{font-size:12px;color:var(--muted-fg)}

/* Part block for kits */
.part-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
.part-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.part-block-title{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--primary)}
.part-block-sub{font-size:11px;color:var(--muted-fg)}

@media(max-width:640px){
  .modal-content{max-height:88vh}
  .page-header{flex-direction:column;align-items:flex-start}
}
.toast{position:fixed;top:20px;right:20px;z-index:200;background:var(--toast-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;box-shadow:var(--shadow);font-size:13px;font-weight:600;transform:translateX(120%);transition:transform .3s ease}
.toast.show{transform:translateX(0)}
.toast-success{border-left:3px solid var(--green)}
.toast-error{border-left:3px solid var(--danger)}

/* Checkbox in table */
.row-check{width:18px;height:18px;cursor:pointer;accent-color:var(--primary)}
.transfer-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer}
.transfer-row:hover{background:var(--hover-overlay)}
.transfer-row.selected{border-color:var(--primary);background:var(--primary-dim)}
.transfer-row .tr-info{flex:1}
.transfer-row .tr-id{font-family:var(--font-mono);font-weight:700;color:var(--primary);font-size:14px}
.transfer-row .tr-meta{font-size:11px;color:var(--muted-fg)}
</style>
</head>

<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div><div class="brand-name">MG Packing</div><div class="brand-sub">System v3.3</div></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">
      <svg class="moon" style="position:absolute;left:5px;width:11px;height:11px;opacity:1"><use href="#ic-moon"/></svg>
      <svg class="sun" style="position:absolute;right:5px;width:11px;height:11px;opacity:0"><use href="#ic-sun"/></svg>
    </button>
    <div class="section-label">Staff</div>
    <nav>
      <a href="index.html" data-page="index"><svg><use href="#ic-list"/></svg>Packing Lists</a>
      <a href="staff.html" data-page="staff"><svg><use href="#ic-plus"/></svg>Staff Entry</a>
    </nav>
    <div class="section-label">Supervisor</div>
    <nav>
      <a href="checker.html" data-page="checker"><svg><use href="#ic-check-sq"/></svg>Checker View</a>
      <a href="transfer.html" data-page="transfer"><svg><use href="#ic-transfer"/></svg>Transfer</a>
      <a href="rejects.html" data-page="rejects" class="danger"><svg><use href="#ic-alert"/></svg>Reject List</a>
    </nav>
    <div class="section-label">Tools</div>
    <nav>
      <a href="missing.html" data-page="missing"><svg><use href="#ic-missing"/></svg>Missing Cartons</a>
    </nav>
    <div style="flex:1"></div>
  </div>
  <div id="main">
    <div id="list-content">
      <div class="empty-state"><div class="spinner" style="width:28px;height:28px;margin:0 auto 12px;display:block"></div><p>Loading packing list...</p></div>
    </div>
  </div>
</div>

<!-- Carton Detail Modal -->
<div id="cartonModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3><svg width="16" height="16"><use href="#ic-box"/></svg> <span id="modalCartonId">Carton Detail</span></h3>
      <button class="close-btn" onclick="closeModal()"><svg width="14" height="14"><use href="#ic-x"/></svg></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

<!-- Complete Password Modal -->

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
'use strict';

var GAS_URL = 'https://script.google.com/macros/s/AKfycbxtHkqSH3iUCe-8ZUT3PO500Rpm3OLTTEIrvLGP36sO9ZoDRVOLD29e2P25NlsTRdfy1Q/exec';
var ALL_CARTONS = [];
var ALL_LISTS = [];
var CURRENT_LIST = null;
var CURRENT_LIST_REF = '';
var SELECTED_CARTONS = new Set();

(function initTheme() {
  const saved = localStorage.getItem('mg-theme');
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mg-theme', next);
}

function initSidebar(currentPage) {
  document.querySelectorAll('nav a[data-page]').forEach(a => {
    if (a.dataset.page === currentPage) a.classList.add('active');
  });
}

function escHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function gasGet(params) {
  if (!GAS_URL) return null;
  const url = GAS_URL + '?' + new URLSearchParams(params);
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 25000);
    const r = await fetch(url, { signal: ctrl.signal, redirect: 'follow' });
    clearTimeout(t);
    const txt = await r.text();
    if (!txt || !txt.trim()) return null;
    if (txt.trim().startsWith('<')) return null;
    try { return JSON.parse(txt); } catch { return null; }
  } catch(err) { return null; }
}

async function gasPost(params) {
  if (!GAS_URL) return null;
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 25000);
    const r = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(params),
      signal: ctrl.signal,
      redirect: 'follow'
    });
    clearTimeout(t);
    const txt = await r.text();
    if (!txt || !txt.trim()) return null;
    if (txt.trim().startsWith('<')) return null;
    try { return JSON.parse(txt); } catch { return null; }
  } catch(err) { return null; }
}

function getThumbUrl(url, size) {
  if (!url) return '';
  if (url.startsWith('data:')) return url;
  if (url.includes('drive.google.com') || url.includes('googleusercontent')) {
    const m = url.match(/[-\w]{25,}/);
    if (m) return 'https://drive.google.com/thumbnail?id=' + m[0] + '&sz=w' + size;
  }
  return url;
}

function statusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('rejected')) return '<span class="badge badge-red">REJECTED</span>';
  if (s.includes('verified')) return '<span class="badge badge-green">VERIFIED</span>';
  if (s.includes('pending')) return '<span class="badge badge-amber">PENDING</span>';
  if (s.includes('partial')) return '<span class="badge badge-blue">PARTIAL</span>';
  if (s.includes('completed')) return '<span class="badge badge-green">COMPLETED</span>';
  return '<span class="badge badge-muted">' + escHtml(status || 'UNKNOWN') + '</span>';
}

function listStatusBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('rejected')) return '<span class="badge badge-red">HAS REJECTED</span>';
  if (s.includes('completed')) return '<span class="badge badge-green">COMPLETED</span>';
  if (s.includes('partial')) return '<span class="badge badge-blue">PARTIAL</span>';
  if (s.includes('verified')) return '<span class="badge badge-green">VERIFIED</span>';
  if (s.includes('open')) return '<span class="badge badge-amber">OPEN</span>';
  return '<span class="badge badge-muted">' + escHtml(status || 'UNKNOWN') + '</span>';
}

function barcodeDots(rec) {
  const bag = rec.bagMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.bag ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  const inner = rec.innerMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.inner ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  const outer = rec.outerMatch ? '<span class="barcode-dot ok">\u2713</span>' : (rec.outer ? '<span class="barcode-dot fail">\u2717</span>' : '<span class="barcode-dot fail">\u2014</span>');
  return 'B' + bag + ' I' + inner + ' O' + outer;
}

function fmtDate(ts) {
  if (!ts) return '\u2014';
  const d = new Date(ts);
  if (isNaN(d)) return String(ts).slice(0,10);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + (type || 'success');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function collectPhotos(carton) {
  var photos = [];
  if (carton.photos && Array.isArray(carton.photos)) photos = photos.concat(carton.photos);
  if (carton.photoUrls && Array.isArray(carton.photoUrls)) photos = photos.concat(carton.photoUrls);
  var photoFields = ['imgBagUrl','imgInnerUrl','imgCartonUrl','imgOuterUrl','bagPhoto','innerPhoto','outerPhoto','partPhoto','photo1','photo2','photo3','photo4','photo5','imgBag','imgInner','imgCarton','imgOuter','bagUrl','innerUrl','outerUrl','cartonUrl','photoUrl','imageUrl','image1','image2','image3'];
  for (var i = 0; i < photoFields.length; i++) {
    var val = carton[photoFields[i]];
    if (val && String(val).trim().length > 0) photos.push(String(val).trim());
  }
  for (var key in carton) {
    if (carton.hasOwnProperty(key)) {
      var v = carton[key];
      if (v && typeof v === 'string' && v.length > 10 && (v.indexOf('http') === 0 || v.indexOf('drive.google') !== -1 || v.indexOf('googleusercontent') !== -1)) {
        if (photos.indexOf(v) === -1) photos.push(v);
      }
    }
  }
  return photos.filter(function(u) { return u && u.length > 0; });
}

// ============================================================
// Group raw sheet rows by cartonId, merge parts, sort A-Z
// ============================================================
function processCartons(rawCartons) {
  if (!Array.isArray(rawCartons)) return [];
  var map = {};
  for (var i = 0; i < rawCartons.length; i++) {
    var c = rawCartons[i];
    var id = String(c.cartonId || c.CartonId || c.cartonID || '').trim();
    if (!id) id = 'UNKNOWN';
    if (!map[id]) {
      map[id] = {};
      for (var k in c) {
        if (c.hasOwnProperty(k)) {
          map[id][k] = c[k];
        }
      }
      map[id].parts = [];
      map[id]._rows = [];
      map[id].allPhotos = [];
    }
    // Capture part with its own barcodes
    var partNo = c.partNo || c.PartNo || c.partNumber || '';
    var qty = c.qty || c.Qty || c.cartonQty || c.quantity || '1';
    if (partNo || qty) {
      map[id].parts.push({
        partNo: String(partNo),
        qty: String(qty),
        bag: c.bag || c.BagBarcode || c.bagBarcode || '',
        inner: c.inner || c.InnerBarcode || c.innerBarcode || '',
        outer: c.outer || c.OuterBarcode || c.outerBarcode || '',
        bagMatch: !!c.bagMatch || !!c.BagMatch,
        innerMatch: !!c.innerMatch || !!c.InnerMatch,
        outerMatch: !!c.outerMatch || !!c.OuterMatch
      });
    }
    if (c.row) map[id]._rows.push(c.row);
    // Merge photos
    var rowPhotos = collectPhotos(c);
    for (var p = 0; p < rowPhotos.length; p++) {
      if (map[id].allPhotos.indexOf(rowPhotos[p]) === -1) {
        map[id].allPhotos.push(rowPhotos[p]);
      }
    }
  }
  var result = [];
  for (var key in map) {
    if (map.hasOwnProperty(key)) {
      result.push(map[key]);
    }
  }
  result.sort(function(a, b) {
    return String(a.cartonId).localeCompare(String(b.cartonId));
  });
  return result;
}

// Helper: build barcode-checker HTML for a single part
function partBarcodeHtml(part) {
  var bagIcon = part.bagMatch ? '<div class="bc-icon ok">\u2713</div>' : (part.bag ? '<div class="bc-icon fail">\u2717</div>' : '<div class="bc-icon na">\u2014</div>');
  var innerIcon = part.innerMatch ? '<div class="bc-icon ok">\u2713</div>' : (part.inner ? '<div class="bc-icon fail">\u2717</div>' : '<div class="bc-icon na">\u2014</div>');
  var outerIcon = part.outerMatch ? '<div class="bc-icon ok">\u2713</div>' : (part.outer ? '<div class="bc-icon fail">\u2717</div>' : '<div class="bc-icon na">\u2014</div>');
  var bagStatus = part.bagMatch ? '<span class="text-green">MATCH</span>' : (part.bag ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
  var innerStatus = part.innerMatch ? '<span class="text-green">MATCH</span>' : (part.inner ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
  var outerStatus = part.outerMatch ? '<span class="text-green">MATCH</span>' : (part.outer ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
  
  return '<div class="barcode-checker">' + bagIcon + '<div class="bc-info"><div class="bc-label">Bag Barcode</div><div class="bc-value">' + escHtml(part.bag || '\u2014') + '</div></div><div class="bc-status">' + bagStatus + '</div></div>' +
         '<div class="barcode-checker">' + innerIcon + '<div class="bc-info"><div class="bc-label">Inner Barcode</div><div class="bc-value">' + escHtml(part.inner || '\u2014') + '</div></div><div class="bc-status">' + innerStatus + '</div></div>' +
         '<div class="barcode-checker">' + outerIcon + '<div class="bc-info"><div class="bc-label">Outer Barcode</div><div class="bc-value">' + escHtml(part.outer || '\u2014') + '</div></div><div class="bc-status">' + outerStatus + '</div></div>';
}

    }
    photosHtml += '</div>';
  } else {
    photosHtml = '<div style="padding:16px;text-align:center;color:var(--muted-fg);font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)">No photos available</div>';
  }
  
  // For single part, use carton-level barcodes; for multiple, barcodes are shown per-part above
  var barcodeSection = '';

    var innerIcon = carton.innerMatch ? '<div class="bc-icon ok">\u2713</div>' : (carton.inner ? '<div class="bc-icon fail">\u2717</div>' : '<div class="bc-icon na">\u2014</div>');
    var outerIcon = carton.outerMatch ? '<div class="bc-icon ok">\u2713</div>' : (carton.outer ? '<div class="bc-icon fail">\u2717</div>' : '<div class="bc-icon na">\u2014</div>');
    var bagStatus = carton.bagMatch ? '<span class="text-green">MATCH</span>' : (carton.bag ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
    var innerStatus = carton.innerMatch ? '<span class="text-green">MATCH</span>' : (carton.inner ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
    var outerStatus = carton.outerMatch ? '<span class="text-green">MATCH</span>' : (carton.outer ? '<span class="text-danger">MISMATCH</span>' : '<span class="text-muted">NOT SCANNED</span>');
    barcodeSection = '<div class="checker-section">' +
      '<div class="checker-section-title">Barcode Verification</div>' +
      '<div class="barcode-checker">' + bagIcon + '<div class="bc-info"><div class="bc-label">Bag Barcode</div><div class="bc-value">' + escHtml(carton.bag || '\u2014') + '</div></div><div class="bc-status">' + bagStatus + '</div></div>' +
      '<div class="barcode-checker">' + innerIcon + '<div class="bc-info"><div class="bc-label">Inner Barcode</div><div class="bc-value">' + escHtml(carton.inner || '\u2014') + '</div></div><div class="bc-status">' + innerStatus + '</div></div>' +
      '<div class="barcode-checker">' + outerIcon + '<div class="bc-info"><div class="bc-label">Outer Barcode</div><div class="bc-value">' + escHtml(carton.outer || '\u2014') + '</div></div><div class="bc-status">' + outerStatus + '</div></div>' +

      (parts.length === 1 && partsHtml ? '<div style="margin-top:8px">' + partsHtml + '</div>' : '') +
      '<div class="checker-row"><span class="label">Total Qty</span><span class="value">' + escHtml(carton.qty || carton.cartonQty || '1') + '</span></div>' +

// Complete Modal
function openPasswordModal() {
  var isCompleted = CURRENT_LIST && (CURRENT_LIST.status || '').toLowerCase().includes('completed');
  if (isCompleted) { showToast('This packing list is already completed', 'error'); return; }
  document.getElementById('completePassword').value = '';
  document.getElementById('passwordError').style.display = 'none';
  document.getElementById('pwListRef').textContent = CURRENT_LIST_REF;
  document.getElementById('passwordModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.getElementById('completePassword').focus(); }, 100);
}
function closePasswordModal() {
  document.getElementById('passwordModal').classList.remove('active');
  document.body.style.overflow = '';
}
function closePasswordModalOnOverlay(e) {
  if (e.target === e.currentTarget) closePasswordModal();
}
async function confirmComplete() {
  var pw = document.getElementById('completePassword').value.trim();
  if (pw !== 'simon1981') {
    document.getElementById('passwordError').style.display = 'block';
    return;
  }
  document.getElementById('passwordError').style.display = 'none';
  var res = await gasPost({ action: 'completeList', listRef: CURRENT_LIST_REF, password: pw });
  if (res && res.success) {
    showToast('Packing list marked as COMPLETED', 'success');
    closePasswordModal();
    setTimeout(function() { location.reload(); }, 800);
  } else {
    showToast(res && res.error ? res.error : 'Failed to complete list', 'error');
  }
}

  document.getElementById('trNewPrefix').value = '';
  document.getElementById('trReason').value = '';
  
  var listHtml = '';
  for (var i = 0; i < ALL_CARTONS.length; i++) {
    var c = ALL_CARTONS[i];
    listHtml += '<div class="transfer-row" id="trRow_' + i + '" onclick="toggleTransferRow(' + i + ')">' +
      '<input type="checkbox" class="row-check" id="trCheck_' + i + '" onchange="event.stopPropagation();toggleTransferRow(' + i + ')" onclick="event.stopPropagation()">' +
      '<div class="tr-info">' +
        '<div class="tr-id">' + escHtml(c.cartonId) + '</div>' +
        '<div class="tr-meta">' + (c.parts && c.parts.length > 1 ? c.parts.length + ' parts' : escHtml(c.partNo || '')) + ' | Qty: ' + escHtml(c.qty || '1') + ' | ' + escHtml(c.pi || '') + '</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('trCartonList').innerHTML = listHtml;
  
  var select = document.getElementById('trToList');
  select.innerHTML = '<option value="">-- Select destination --</option>';
  for (var j = 0; j < ALL_LISTS.length; j++) {
    var l = ALL_LISTS[j];
    if (l.listRef !== CURRENT_LIST_REF) {
      select.innerHTML += '<option value="' + escHtml(l.listRef) + '">' + escHtml(l.listRef) + ' - ' + escHtml(l.customer || '') + '</option>';
    }
  }
  
  document.getElementById('transferModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function toggleTransferRow(idx) {
  var row = document.getElementById('trRow_' + idx);
  var chk = document.getElementById('trCheck_' + idx);
  if (SELECTED_CARTONS.has(idx)) {
    SELECTED_CARTONS.delete(idx);
    row.classList.remove('selected');
    chk.checked = false;
  } else {
    SELECTED_CARTONS.add(idx);
    row.classList.add('selected');
    chk.checked = true;
  }
}

function closeTransferModal() {
  document.getElementById('transferModal').classList.remove('active');
  document.body.style.overflow = '';
  SELECTED_CARTONS.clear();
}
function closeTransferModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeTransferModal();
}

// ============================================================
// Submit a carton transfer.
// v3.6 FIX: each selected carton is sent as ONE entry carrying
// ALL of its rows (`rows: [...]`). Previously, multi-part/kit
// cartons were flattened into one entry PER ROW, which caused
// approveTransfer() on the backend to treat every part-row as
// its own separate carton (splitting a single 4-part carton
// into four cartons with four different new Carton IDs). Now
// a carton's rows always travel together and get renumbered as
// ONE unit on approval.
// ============================================================
async function submitTransfer() {
  var toList = document.getElementById('trToList').value;
  var prefix = document.getElementById('trNewPrefix').value.trim();
  var reason = document.getElementById('trReason').value.trim();
  
  if (SELECTED_CARTONS.size === 0) { showToast('Please select at least one carton', 'error'); return; }
  if (!toList) { showToast('Please select destination packing list', 'error'); return; }
  
  var cartons = [];
  var cartonIds = [];
  SELECTED_CARTONS.forEach(function(idx) {
    var c = ALL_CARTONS[idx];
    var rows = c._rows && c._rows.length ? c._rows : [c.row];
    // Keep ALL rows of this carton grouped together under ONE entry, so
    // multi-part / kit cartons stay as a single carton through transfer.
    cartons.push({ cartonRef: c.cartonRef, cartonId: c.cartonId, rows: rows });
    cartonIds.push(c.cartonId);
  });
  
  var res = await gasPost({
    action: 'createTransfer',
    fromListRef: CURRENT_LIST_REF,
    toListRef: toList,
    cartons: JSON.stringify(cartons),
    newPrefix: prefix,
    reason: reason,
    requestedBy: 'Manager'
  });
  
  if (res && res.success) {
    showToast('Transfer ' + res.transferId + ' created! Waiting for approval.', 'success');
    closeTransferModal();
  } else {
    showToast(res && res.error ? res.error : 'Transfer failed', 'error');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
    closePasswordModal();
    closeTransferModal();
  }
  if (e.key === 'Enter' && document.getElementById('passwordModal').classList.contains('active')) {
    confirmComplete();
  }
});
