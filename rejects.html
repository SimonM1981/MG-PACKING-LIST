<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reject List — MG Packing</title>
<link rel="stylesheet" href="shared.css"><script src="shared.js"></script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div><div class="brand-name">MG Packing</div><div class="brand-sub">System v3.2</div></div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">
      <svg class="moon"><use href="#ic-moon"/></svg>
      <svg class="sun"><use href="#ic-sun"/></svg>
    </button>
    <div class="section-label">Staff</div>
    <nav>
      <a href="#" data-page="index" onclick="goTo('index');return false"><svg><use href="#ic-list"/></svg>Packing Lists</a>
      <a href="#" data-page="staff" onclick="goTo('staff');return false"><svg><use href="#ic-plus"/></svg>Staff Entry</a>
    </nav>
    <div class="section-label">Supervisor</div>
    <nav>
      <a href="#" data-page="checker" onclick="goTo('checker');return false"><svg><use href="#ic-check-sq"/></svg>Checker View</a>
      <a href="#" data-page="transfer" onclick="goTo('transfer');return false"><svg><use href="#ic-transfer"/></svg>Transfer</a>
      <a href="#" data-page="rejects" class="active danger"><svg><use href="#ic-alert"/></svg>Reject List</a>
    </nav>
    <div class="section-label">Tools</div>
    <nav>
      <a href="#" data-page="missing" onclick="goTo('missing');return false"><svg><use href="#ic-missing"/></svg>Missing Cartons</a>
    </nav>
    <div style="flex:1"></div>
  </div>
  <div id="main">
    <div class="page-header">
      <div>
        <div class="page-title" style="color:var(--danger)"><svg style="color:var(--danger)"><use href="#ic-alert"/></svg>Reject List</div>
        <div class="page-subtitle">Cartons rejected by checker — click Edit to fix and resubmit.</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="loadRejects()"><svg><use href="#ic-refresh"/></svg>Refresh</button>
    </div>
    <div id="reject-content">
      <div class="empty-state"><div class="spinner" style="width:28px;height:28px;margin:0 auto 12px;display:block"></div><p>Loading rejected entries...</p></div>
    </div>
    <div id="reject-modal-wrap"></div>
  </div>
</div>

<script>
(function() {
  initSidebar('rejects');

  async function loadRejects() {
    let rejected = [];
    try { const res = await gasGet({ action: 'rejectedRecords' }); if (res && res.records) rejected = res.records; } catch(e) {}

    const el = document.getElementById('reject-content');
    const groups = {};
    for (const r of rejected) {
      const key = (r.customer || 'unknown') + '|' + (r.cartonId || 'unknown');
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    }
    const groupKeys = Object.keys(groups);

    let html = `<div class="stat-grid" style="max-width:300px;margin-bottom:20px"><div class="stat-card"><div class="label">Total Rejected</div><div class="value text-danger">${groupKeys.length}</div></div></div>`;
    if (groupKeys.length === 0) {
      html += '<div class="empty-state"><svg><use href="#ic-check-circle"/></svg><p>No rejected entries — great job!</p></div>';
      el.innerHTML = html;
      return;
    }

    for (const key of groupKeys) {
      const grecs = groups[key];
      const first = grecs[0];
      const rowNums = grecs.map(r => r.row).filter(Boolean).join(',');
      const partNos = [...new Set(grecs.map(r => r.partNo).filter(Boolean))];
      const pis = [...new Set(grecs.map(r => r.pi).filter(Boolean))];
      const totalQty = grecs.reduce((s, r) => s + (parseInt(r.qty) || 0), 0);
      const escCartonId = escHtml(first.cartonId || '');
      const escCustomer = escHtml(first.customer || '');
      const escListRef = escHtml((first.listRef || first.packingList || '').trim());

      html += `<div class="record-card rejected" style="border-left:4px solid var(--danger)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:800;font-size:1.05rem;color:var(--danger)">${escCustomer || 'Unknown'}</div>
          <span class="badge badge-red">REJECTED</span>
        </div>
        <div style="font-size:0.85rem;color:var(--muted-fg);margin-bottom:6px">
          <strong>PL:</strong> ${escListRef || '—'} | <strong>Carton:</strong> ${escCartonId || '—'} | <strong>Parts:</strong> ${escHtml(partNos.join(', ') || '—')}
          ${grecs.length > 1 ? '<span class="badge badge-muted" style="margin-left:6px">' + grecs.length + ' parts</span>' : ''}
        </div>
        <div style="display:flex;gap:12px;font-size:0.8rem;color:var(--muted-fg);margin-bottom:4px">
          <span><strong>PI:</strong> ${escHtml(pis.join(', ') || '—')}</span><span><strong>Qty:</strong> ${totalQty} pcs</span><span><strong>Packed:</strong> ${escHtml(first.packedBy || '—')}</span>
        </div>
        <div style="font-size:0.8rem;color:var(--danger);margin-top:8px;font-style:italic;background:var(--danger-dim);padding:8px;border-radius:6px;border:1px solid var(--danger-border)">
          <strong>Reason:</strong> ${escHtml(first.remarks || 'No reason')}<br/><strong>By:</strong> ${escHtml(first.checker || 'Checker')}
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-danger btn-sm" onclick="editCarton('${escCartonId.replace(/'/g, "\\'")}', '${escCustomer.replace(/'/g, "\\'")}', '${rowNums}', '${escListRef.replace(/'/g, "\\'")}')">
            <svg><use href="#ic-edit"/></svg>Edit & Resubmit
          </button>
          <button class="btn btn-outline btn-sm" onclick="openDetailGroup('${rowNums}')">
            <svg><use href="#ic-zoom"/></svg>View Detail
          </button>
        </div>
      </div>`;
    }
    el.innerHTML = html;
  }

  window.editCarton = async function(cartonId, customer, rowNums, listRef) {
    // Trim listRef to prevent space mismatch
    const cleanListRef = (listRef || '').trim();
    if (!cleanListRef) {
      toast('Packing list reference is missing — cannot edit.', 'error');
      return;
    }

    // If listRef not provided, fallback to search by customer
    if (!cleanListRef) {
      let lists = [];
      try { const res = await gasGet({ action: 'packingLists' }); if (res && res.lists) lists = res.lists; } catch(e) {}
      const customerLower = (customer || '').toLowerCase();
      let foundList = lists.find(l => (l.customer || '').toLowerCase() === customerLower);
      if (!foundList) foundList = lists.find(l => (l.customer || '').toLowerCase().includes(customerLower));
      if (!foundList) { toast('Packing list not found for: ' + customer, 'error'); return; }
      listRef = foundList.listRef;
    }

    const rowsArr = rowNums.split(',').map(Number).filter(Boolean);

    toast('Opening packing list...', 'success');
    localStorage.setItem('mg_pending_edit', JSON.stringify({
      listRef: cleanListRef,
      cartonId: cartonId,
      row: rowsArr[0] || null,                // backward compat for staff.html
      logRows: rowsArr,
      gasRows: rowsArr
    }));
    goTo('staff');
  };

  window.openDetailGroup = async function(rowNums) {
    const wrap = document.getElementById('reject-modal-wrap');
    const nums = rowNums.split(',').map(n => parseInt(n.trim())).filter(Boolean);
    if (nums.length === 0) return;
    wrap.innerHTML = '<div class="modal-backdrop"><div class="modal" style="max-width:640px"><div class="modal-body text-center"><div class="spinner" style="width:28px;height:28px;margin:24px auto"></div><p>Loading...</p></div></div></div>';
    let records = [];
    try { const res = await gasGet({ action: 'batchRecords', rows: nums.join(',') }); if (res && res.records) records = res.records; } catch {}
    if (records.length === 0) { wrap.innerHTML = ''; return; }
    const first = records[0];
    const totalQty = records.reduce((s, r) => s + (parseInt(r.qty) || 0), 0);

    const partsHtml = records.map((r, idx) => {
      return `<div style="border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;background:var(--muted)">
        <div style="font-weight:700;font-size:0.9rem;margin-bottom:8px;color:var(--primary)">Part ${idx + 1}: ${escHtml(r.partNo || '—')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.8rem;margin-bottom:8px"><div><strong>PI:</strong> ${escHtml(r.pi || '—')}</div><div><strong>Qty:</strong> ${r.qty || '0'} pcs</div></div>
        <div style="display:flex;flex-direction:column;gap:4px;font-size:0.8rem">
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:6px"><span style="color:${r.bagMatch ? 'var(--green)' : 'var(--danger)'}">${r.bagMatch ? '✅' : '❌'}</span><span><strong>Bag:</strong> ${escHtml(r.bag || '—')}</span></div>
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:6px"><span style="color:${r.innerMatch ? 'var(--green)' : 'var(--danger)'}">${r.innerMatch ? '✅' : '❌'}</span><span><strong>Inner:</strong> ${escHtml(r.inner || '—')}</span></div>
          <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:6px"><span style="color:${r.outerMatch ? 'var(--green)' : 'var(--danger)'}">${r.outerMatch ? '✅' : '❌'}</span><span><strong>Outer:</strong> ${escHtml(r.outer || '—')}</span></div>
        </div>
      </div>`;
    }).join('');

    wrap.innerHTML = `<div class="modal-backdrop" onclick="if(event.target===this)document.getElementById('reject-modal-wrap').innerHTML='';">
      <div class="modal" style="max-width:640px">
        <div class="modal-header">
          <div class="modal-title"><svg style="width:16px;height:16px"><use href="#ic-check-sq"/></svg>${escHtml(first.customer || 'Record')}<span class="badge badge-red" style="margin-left:8px">REJECTED</span></div>
          <button class="btn-icon" onclick="document.getElementById('reject-modal-wrap').innerHTML='';"><svg style="width:14px;height:14px"><use href="#ic-x"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="detail-kv" style="margin-bottom:16px">
            <div class="kv-box"><div class="kv-label">Carton ID</div><div class="kv-value">${escHtml(first.cartonId || '—')}</div></div>
            <div class="kv-box"><div class="kv-label">Packed By</div><div class="kv-value">${escHtml(first.packedBy || '—')}</div></div>
            <div class="kv-box"><div class="kv-label">Total Qty</div><div class="kv-value">${totalQty}</div></div>
            <div class="kv-box"><div class="kv-label">Parts</div><div class="kv-value">${records.length}</div></div>
          </div>
          <div style="font-size:0.8rem;color:var(--danger);margin-bottom:16px;font-style:italic;background:var(--danger-dim);padding:10px;border-radius:6px;border:1px solid var(--danger-border)">
            <strong>Rejection Reason:</strong> ${escHtml(first.remarks || 'No reason')}<br/><strong>Rejected By:</strong> ${escHtml(first.checker || 'Checker')}
          </div>
          <div class="section-title">Part Details</div>
          ${partsHtml}
        </div>
      </div>
    </div>`;
  };

  loadRejects();
})();
</script>
</body>
</html>
